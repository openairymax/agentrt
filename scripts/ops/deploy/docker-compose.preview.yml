# AgentOS Docker Compose 配置文件 - Preview 环境
# 用于功能预览和测试

version: '3.8'

services:
  # ==================== AgentOS Preview 服务 ====================
  agentos-preview:
    build:
      context: ../../
      dockerfile: scripts/deployment/docker/Dockerfile.service
      target: preview
    image: ${DOCKER_REGISTRY:-spharx}/agentos-preview:0.1.0
    container_name: agentos-preview
    hostname: agentos-preview
    restart: unless-stopped

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - AGENTOS_ENV=preview
      - AGENTOS_LOG_LEVEL=INFO
      - AGENTOS_LOG_FORMAT=json
      - AGENTOS_ENABLE_TRACING=true
      - AGENTOS_TELEMETRY_ENDPOINT=http://otel-collector:4317

    # 端口映射
    ports:
      - "8085:8085"

    # 数据卷挂载
    volumes:
      - preview-logs:/var/log/agentos:rw
      - preview-data:/var/lib/agentos:rw
      - ../../agentos/manager/preview:/etc/agentos:ro

    # 网络配置
    networks:
      - agentos-preview-network

    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # 启动命令
    command: >
      bash -c "
        echo 'Starting AgentOS Preview...';
        python3 -m scripts.core.cli --manager /etc/agentos/manager.yaml;
      "

    # 依赖
    depends_on:
      - redis-preview
      - postgres-preview

  # ==================== 辅助服务 ====================
  redis-preview:
    image: redis:7-alpine
    container_name: agentos-redis-preview
    hostname: agentos-redis-preview
    restart: unless-stopped

    # 数据持久化
    volumes:
      - redis-preview-data:/data

    # 网络配置
    networks:
      - agentos-preview-network

    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-preview:
    image: postgres:15-alpine
    container_name: agentos-postgres-preview
    hostname: agentos-postgres-preview
    restart: unless-stopped

    # 环境变量
    environment:
      - POSTGRES_DB=agentos_preview
      - POSTGRES_USER=agentos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    # 数据持久化
    volumes:
      - postgres-preview-data:/var/lib/postgresql/data

    # 网络配置
    networks:
      - agentos-preview-network

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==================== 数据卷 ====================
volumes:
  preview-logs:
    driver: local
  preview-data:
    driver: local
  redis-preview-data:
    driver: local
  postgres-preview-data:
    driver: local

# ==================== 网络配置 ====================
networks:
  agentos-preview-network:
    driver: bridge
    ipam:
      manager:
        - subnet: 172.32.0.0/16