# Video Editing Platform Configuration\n# ====================================\n\n# Server Configuration\nhost: "0.0.0.0"\nport: 8001\ndebug: false\n\n# File System Configuration\noutput_dir: "./output"\ntemp_dir: "./temp"\nmax_file_size: 5368709120  # 5GB in bytes\nupload_dir: "./uploads"\n\n# Supported Video Formats\nsupported_formats:\n  input:\n    - ".mp4"\n    - ".avi"\n    - ".mov"\n    - ".mkv"\n    - ".flv"\n    - ".wmv"\n    - ".webm"\n    - ".mpeg"\n    - ".mpg"\n    - ".3gp"\n  output:\n    - ".mp4"\n    - ".avi"\n    - ".mov"\n    - ".mkv"\n    - ".webm"\n    - ".gif"\n\n# FFmpeg Configuration\nffmpeg:\n  path: "ffmpeg"  # or full path like "/usr/bin/ffmpeg"\n  timeout: 3600  # seconds\n  threads: 4\n  preset: "medium"  # ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow\n  crf: 23  # Constant Rate Factor for quality (0-51, lower is better)\n\n# Video Processing Defaults\nvideo:\n  default_codec: "libx264"\n  default_audio_codec: "aac"\n  default_bitrate: "2M"\n  default_resolution: "1920x1080"\n  default_fps: 30\n  default_pixel_format: "yuv420p"\n\n# Audio Processing Defaults\naudio:\n  default_codec: "aac"\n  default_bitrate: "128k"\n  default_sample_rate: 44100\n  default_channels: 2\n\n# Thumbnail Generation\nthumbnails:\n  default_count: 3\n  default_width: 320\n  default_height: 180\n  format: "jpg"\n  quality: 85\n\n# Effects Configuration\neffects:\n  transitions:\n    - "fade"\n    - "dissolve"\n    - "wipe"\n    - "slide"\n  filters:\n    - "brightness"\n    - "contrast"\n    - "saturation"\n    - "blur"\n    - "sharpen"\n    - "grayscale"\n    - "sepia"\n\n# Task Configuration\ntasks:\n  max_concurrent: 2\n  auto_cleanup_hours: 24\n  retry_attempts: 3\n  retry_delay: 60  # seconds\n\n# CORS Configuration\ncors_origins:\n  - "http://localhost:3000"\n  - "http://localhost:8001"\ncors_allow_credentials: true\ncors_allow_methods: ["*"]\ncors_allow_headers: ["*"]\n\n# Security Configuration\nsecurity:\n  rate_limit_requests: 50\n  rate_limit_period: 60  # seconds\n