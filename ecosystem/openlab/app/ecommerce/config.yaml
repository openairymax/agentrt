# E-commerce Platform Configuration\n# =================================\n\n# Database Configuration\ndatabase_url: "sqlite:///./ecommerce.db"\n# For production, use PostgreSQL:\n# database_url: "postgresql://user:password@localhost:5432/ecommerce"\n\n# Redis Configuration\nredis_url: "redis://localhost:6379"\nredis_cache_ttl: 3600  # seconds\n\n# JWT Configuration\njwt_secret_key: "your-secret-key-change-in-production"\njwt_algorithm: "HS256"\njwt_access_token_expire_minutes: 30\njwt_refresh_token_expire_days: 7\n\n# Stripe Configuration (Payment Processing)\nstripe_secret_key: "sk_test_your_stripe_secret_key"\nstripe_public_key: "pk_test_your_stripe_public_key"\nstripe_webhook_secret: "whsec_your_webhook_secret"\nstripe_currency: "usd"\n\n# Server Configuration\nhost: "0.0.0.0"\nport: 8000\ndebug: false\nreload: false\nworkers: 4\n\n# CORS Configuration\ncors_origins:\n  - "http://localhost:3000"\n  - "http://localhost:8000"\n  - "https://yourdomain.com"\n\ncors_allow_credentials: true\ncors_allow_methods: ["*"]\ncors_allow_headers: ["*"]\n\n# Security Configuration\nsecurity:\n  bcrypt_rounds: 12\n  rate_limit_requests: 100\n  rate_limit_period: 60  # seconds\n  session_timeout: 3600  # seconds\n  password_min_length: 8\n  password_require_special: true\n  password_require_number: true\n  password_require_uppercase: true\n\n# Email Configuration (for notifications)\nemail:\n  enabled: false\n  smtp_server: "smtp.gmail.com"\n  smtp_port: 587\n  smtp_username: ""\n  smtp_password: ""\n  from_email: "noreply@yourdomain.com"\n  use_tls: true\n\n# File Upload Configuration\nuploads:\n  max_file_size: 10485760  # 10MB\n  allowed_extensions:\n    - ".jpg"\n    - ".jpeg"\n    - ".png"\n    - ".gif"\n    - ".webp"\n  upload_dir: "./uploads"\n  serve_static: true\n\n# Product Configuration\nproducts:\n  default_currency: "USD"\n  default_tax_rate: 0.08  # 8%\n  default_shipping_cost: 5.99\n  free_shipping_threshold: 50.00\n  max_products_per_page: 20\n  featured_products_count: 10\n  related_products_count: 5\n\n# Order Configuration\norders:\n  default_status: "pending"\n  statuses:\n    - "pending"\n    - "processing"\n    - "shipped"\n    - "delivered"\n    - "cancelled"\n    - "refunded"\n  auto_cancel_hours: 24\n  max_items_per_order: 50\n\n# Inventory Configuration\ninventory:\n  low_stock_threshold: 10\n  out_of_stock_threshold: 0\n  enable_backorders: false\n  notify_on_low_stock: true\n  notify_email: "inventory@yourdomain.com"\n\n# Shipping Configuration\nshipping:\n  providers:\n    - name: "standard"\n      cost: 5.99\n      delivery_days: "3-5"\n      enabled: true\n    \n    - name: "express"\n      cost: 12.99\n      delivery_days: "1-2"\n      enabled: true\n    \n    - name: "overnight"\n      cost: 24.99\n      delivery_days: "1"\n      enabled: true\n  \n  free_shipping_enabled: true\n  free_shipping_minimum: 50.00\n\n# Analytics Configuration\nanalytics:\n  enabled: true\n  track_pageviews: true\n  track_events: true\n  track_conversions: true\n  retention_days: 90\n  daily_report_time: "00:00"\n  weekly_report_day: "monday"\n  monthly_report_day: 1\n\n# Cache Configuration\ncache:\n  enabled: true\n  default_ttl: 300  # seconds\n  product_ttl: 600\n  category_ttl: 1800\n  user_ttl: 900\n  order_ttl: 3600\n\n# Logging Configuration\nlogging:\n  level: "INFO"\n  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"\n  file: "ecommerce.log"\n  max_size: 10485760  # 10MB\n  backup_count: 5\n  access_log: true\n  error_log: true\n\n# Monitoring Configuration\nmonitoring:\n  enabled: true\n  health_check_interval: 30  # seconds\n  metrics_port: 9090\n  enable_prometheus: true\n  enable_health_endpoint: true\n  enable_metrics_endpoint: true\n\n# Notification Configuration\nnotifications:\n  email:\n    enabled: false\n    order_confirmation: true\n    shipping_update: true\n    payment_receipt: true\n    low_stock_alert: true\n  \n  sms:\n    enabled: false\n    provider: "twilio"  # or "nexmo", "plivo"\n    order_confirmation: false\n    shipping_update: false\n  \n  push:\n    enabled: false\n    provider: "firebase"  # or "onesignal", "apns"\n    order_update: false\n    promotion: false\n\n# Search Configuration\nsearch:\n  enabled: true\n  provider: "database"  # or "elasticsearch", "algolia"\n  elasticsearch_url: "http://localhost:9200"\n  algolia_app_id: ""\n  algolia_api_key: ""\n  algolia_index: "products"\n  fuzzy_search: true\n  autocomplete_enabled: true\n  synonyms_enabled: true\n\n# SEO Configuration\nseo:\n  site_name: "openlab Marketplace"\n  site_description: "Modern e-commerce platform for openlab"\n  site_keywords: "ecommerce, marketplace, openlab, products"\n  default_meta_image: "/static/images/og-image.jpg"\n  enable_sitemap: true\n  sitemap_url: "/sitemap.xml"\n  enable_robots_txt: true\n  robots_txt_url: "/robots.txt"\n\n# Performance Configuration\nperformance:\n  enable_gzip: true\n  enable_caching: true\n  enable_compression: true\n  enable_minification: false\n  database_pool_size: 20\n  database_max_overflow: 10\n  database_pool_recycle: 3600\n  database_pool_timeout: 30\n\n# Internationalization\ni18n:\n  default_locale: "en"\n  supported_locales:\n    - "en"\n    - "es"\n    - "fr"\n    - "de"\n    - "zh"\n  currency_formats:\n    USD: "${{amount}}"\n    EUR: "鈧瑊{amount}}"\n    GBP: "拢{{amount}}"\n    JPY: "楼{{amount}}"\n  date_format: "YYYY-MM-DD"\n  time_format: "HH:mm:ss"\n\n# Customization\ncustomization:\n  theme: "default"\n  colors:\n    primary: "#2563eb"\n    secondary: "#7c3aed"\n    success: "#10b981"\n    warning: "#f59e0b"\n    danger: "#ef4444"\n    background: "#ffffff"\n    text: "#1f2937"\n  logo_url: "/static/images/logo.png"\n  favicon_url: "/static/images/favicon.ico"\n  enable_custom_css: false\n  custom_css_url: ""\n\n# Webhook Configuration\nwebhooks:\n  enabled: true\n  secret: "your-webhook-secret"\n  events:\n    - "order.created"\n    - "order.updated"\n    - "payment.succeeded"\n    - "payment.failed"\n    - "user.created"\n    - "user.updated"\n  timeout: 5  # seconds\n  retry_attempts: 3\n  retry_delay: 1  # seconds\n\n# Scheduled Tasks\nscheduled_tasks:\n  cleanup_expired_carts:\n    enabled: true\n    schedule: "0 */6 * * *"  # Every 6 hours\n    retention_days: 7\n  \n  generate_reports:\n    enabled: true\n    schedule: "0 0 * * *"  # Daily at midnight\n  \n  update_exchange_rates:\n    enabled: true\n    schedule: "0 */12 * * *"  # Every 12 hours\n    provider: "openexchangerates"  # or "fixer", "currencylayer"\n    api_key: ""\n  \n  backup_database:\n    enabled: true\n    schedule: "0 2 * * *"  # Daily at 2 AM\n    retention_days: 30\n    backup_dir: "./backups"