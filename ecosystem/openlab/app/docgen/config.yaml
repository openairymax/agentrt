# Documentation Generator Configuration\n# =====================================\n\n# Input and Output Directories\ninput_dir: "./src"\noutput_dir: "./docs"\ntemplate_dir: "./templates"\n\n# File Watching\nwatch_mode: false\nwatch_interval: 2.0  # seconds\n\n# File Patterns\ninclude_patterns:\n  - "*.md"\n  - "*.py"\n  - "*.yaml"\n  - "*.json"\n  - "*.txt"\n\nexclude_patterns:\n  - "__pycache__"\n  - "*.pyc"\n  - ".git"\n  - "node_modules"\n  - "*.log"\n  - "*.tmp"\n\n# Markdown Processing\nmarkdown_extensions:\n  - "extra"\n  - "codehilite"\n  - "toc"\n  - "tables"\n\n# Template Settings\ntemplate_variables:\n  project_name: "openlab Documentation"\n  version: "1.0.0"\n  author: "Spharx AgentOS Team"\n  generated_date: "{{ current_date }}"\n\n# Output Formats\noutput_formats:\n  - format: "html"\n    extension: ".html"\n    template: "default.html.j2"\n  \n  - format: "pdf"\n    extension: ".pdf"\n    template: "pdf.html.j2"\n    requires: "weasyprint"  # Optional dependency\n  \n  - format: "markdown"\n    extension: ".md"\n    template: "markdown.j2"\n\n# Navigation\ngenerate_navigation: true\nnavigation_depth: 3\ninclude_table_of_contents: true\n\n# Search\nenable_search: true\nsearch_index_file: "search_index.json"\n\n# Analytics (Optional)\nanalytics:\n  enabled: false\n  provider: "google"  # or "plausible", "matomo"\n  tracking_id: ""\n\n# Theme\ntheme: "default"\ntheme_options:\n  primary_color: "#2563eb"\n  secondary_color: "#7c3aed"\n  font_family: "Inter, system-ui, sans-serif"\n  code_font: "JetBrains Mono, monospace"\n\n# Performance\ncache_enabled: true\ncache_ttl: 3600  # seconds\nparallel_processing: true\nmax_workers: 4\n\n# Logging\nlogging:\n  level: "INFO"\n  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"\n  file: "docgen.log"\n  max_size: 10485760  # 10MB\n  backup_count: 5\n\n# Validation\nvalidate_output: true\ncheck_links: true\ncheck_images: true\nvalidate_html: false  # Requires html5validator\n\n# Notifications\nnotifications:\n  enabled: false\n  provider: "email"  # or "slack", "discord", "webhook"\n  settings:\n    email_to: ""\n    email_from: ""\n    smtp_server: "localhost"\n    smtp_port: 25\n\n# Custom Hooks\nhooks:\n  pre_generate: ""\n  post_generate: ""\n  on_error: ""