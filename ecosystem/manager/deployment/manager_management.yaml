# 配置归属（按双重责任模型）
_owner:
  module: "manager"
  contact: "manager-team@example.com"
  path: "AgentRT/manager"
  description: "内容定义责任和管理责任均归属 Manager 模块（自管理配置）"

_config_version: "1.0.0"

# Schema 引用
_schema: "schema/config-management.schema.json"

# =============================================================================
# 配置热更新
# =============================================================================
hot_reload:
  # 是否启用热更新
  enabled: true
  
  # 配置文件检查间隔（秒）
  check_interval_sec: 30
  
  # 信号触发重载（Unix 系统）
  reload_signal: "SIGHUP"
  
  # 支持热更新的配置文件
  watch_files:
    - "kernel/settings.yaml"
    - "logging/manager.yaml"
    - "security/policy.yaml"
    - "security/permission_rules.yaml"
    - "sanitizer/sanitizer_rules.json"
  
  # 支持热更新的配置项（按路径）
  supported_paths:
    - "kernel.log_level"
    - "kernel.scheduler.priority_weights"
    - "kernel.memory.leak_detection"
    - "kernel.error.verbose"
    - "logging.level"
    - "logging.mask_fields"
    - "security.rules"
    - "security.audit.alerts"
  
  # 热更新回调配置
  callbacks:
    # 更新前回调
    pre_reload:
      enabled: true
      timeout_sec: 5
    
    # 更新后回调
    post_reload:
      enabled: true
      timeout_sec: 5
    
    # 验证回调
    validate:
      enabled: true
      timeout_sec: 10

# =============================================================================
# 配置版本控制
# =============================================================================
version_control:
  # 是否启用版本控制
  enabled: true
  
  # 后端类型: git, file, database
  backend: "git"
  
  # Git 配置
  git:
    # 配置仓库路径
    repo_path: "${AGENTOS_DATA_DIR}/manager-repo"
    
    # 分支名称
    branch: "manager"
    
    # 自动提交
    auto_commit: true
    
    # 提交消息模板
    commit_message_template: "manager: update {filename} by {user}"
    
    # 推送配置
    push:
      enabled: false
      remote: "origin"
  
  # 文件后端配置
  file:
    # 版本历史目录
    history_dir: "${AGENTOS_DATA_DIR}/manager-history"
    
    # 最大版本数
    max_versions: 100
    
    # 压缩旧版本
    compress_after_versions: 10
  
  # 数据库后端配置
  database:
    # 表名
    table_name: "config_versions"
    
    # 保留天数
    retention_days: 365

# =============================================================================
# 配置回滚
# =============================================================================
rollback:
  # 是否启用回滚
  enabled: true
  
  # 最大回滚步数
  max_steps: 10
  
  # 自动回滚条件
  auto_rollback:
    enabled: true
    # 配置加载失败时自动回滚
    on_load_failure: true
    # 验证失败时自动回滚
    on_validation_failure: true
    # 启动失败时自动回滚
    on_startup_failure: true
  
  # 回滚确认
  require_confirmation: true

# =============================================================================
# 配置验证
# =============================================================================
validation:
  # 启动时验证
  validate_on_startup: true
  
  # 热更新时验证
  validate_on_reload: true
  
  # Schema 验证
  schema_validation:
    enabled: true
    # Schema 目录
    schema_dir: "${AGENTOS_CONFIG_DIR}/schema"
  
  # 自定义验证规则
  custom_rules:
    - name: "check_required_fields"
      enabled: true
    - name: "check_value_ranges"
      enabled: true
    - name: "check_cross_references"
      enabled: true

# =============================================================================
# 配置变更审计
# =============================================================================
audit:
  # 是否启用审计
  enabled: true
  
  # 审计日志路径
  log_path: "${AGENTOS_LOG_DIR}/manager-audit.log"
  
  # 审计事件
  events:
    - "manager.load"
    - "manager.reload"
    - "manager.change"
    - "manager.rollback"
    - "manager.validate"
    - "manager.export"
    - "manager.import"
  
  # 保留天数
  retention_days: 90

# =============================================================================
# 配置加密
# =============================================================================
encryption:
  # 是否启用加密
  enabled: true
  
  # 加密算法
  algorithm: "aes-256-gcm"
  
  # 密钥来源: env, file, vault
  key_source: "env"
  
  # 密钥环境变量名
  key_env_var: "AGENTOS_CONFIG_KEY"
  
  # 密钥文件路径（当 key_source 为 file 时）
  key_file: "${AGENTOS_DATA_DIR}/keys/manager.key"
  
  # 需要加密的字段
  encrypted_fields:
    - "model.*.api_key"
    - "security.secrets.*"
    - "database.password"

# =============================================================================
# 配置导入导出
# =============================================================================
import_export:
  # 导出格式
  export_formats:
    - "yaml"
    - "json"
  
  # 导出时排除敏感字段
  exclude_sensitive: true
  
  # 导入时验证
  validate_on_import: true
  
  # 导入时合并策略: replace, merge, deep_merge
  merge_strategy: "deep_merge"

# =============================================================================
# 配置同步（多实例）
# =============================================================================
sync:
  # 是否启用同步
  enabled: false
  
  # 同步方式: etcd, consul, redis, database
  backend: "redis"
  
  # 同步间隔（秒）
  interval_sec: 60
  
  # 冲突解决策略: last_write_wins, first_write_wins, manual
  conflict_resolution: "last_write_wins"
  
  # Redis 配置
  redis:
    key_prefix: "agentos:manager:"
    ttl_sec: 3600
