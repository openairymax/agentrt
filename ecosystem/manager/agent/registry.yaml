# 配置归属（按双重责任模型）
_owner:
  module: "cupolas"
  contact: "cupolas-team@example.com"
  path: "AgentOS/cupolas"
  description: "内容定义责任归属 cupolas 模块，管理责任归属 Manager 模块"

# 配置版本
_config_version: "1.1.0"

# Schema 引用
_schema: "schema/agent-registry.schema.json"

# 注册表元数据
_metadata:
  last_updated: "2026-04-02T00:00:00Z"
  total_agents: 12
  schema_version: "1.0.0"

# =============================================================================
# Agent 注册列表
# =============================================================================
agents:
  # ===========================================================================
  # 产品经理 Agent
  # ===========================================================================
  - agent_id: "product_manager_v1"
    role: "product_manager"
    source: "builtin"
    version: "1.0.0"
    enabled: true
    contract_path: "agentos/openlab/contrib/agents/product_manager/contract.json"
    description: "负责产品规划、需求分析和项目协调的智能体"

    # =========================================================================
    # 能力定义（按 agent_contract.md 第 2.3 节）
    # =========================================================================
    capabilities:
      - name: "requirement_analysis"
        description: "将用户模糊需求转化为结构化需求文档"
        input_schema:
          type: "object"
          properties:
            goal:
              type: "string"
              description: "用户目标描述"
            context:
              type: "object"
              description: "业务上下文信息"
          required: ["goal"]
        output_schema:
          type: "object"
          properties:
            prd:
              type: "string"
              description: "产品需求文档"
            user_stories:
              type: "array"
              items:
                type: "string"
              description: "用户故事列表"
        estimated_tokens: 5000
        avg_duration_ms: 3000
        success_rate: 0.92
      - name: "project_planning"
        description: "制定项目计划和里程碑"
        estimated_tokens: 3000
        avg_duration_ms: 2000
      - name: "stakeholder_communication"
        description: "与利益相关者沟通协调"
        estimated_tokens: 2000
        avg_duration_ms: 1500
      - name: "roadmap_creation"
        description: "创建产品路线图"
        estimated_tokens: 4000
        avg_duration_ms: 2500

    # =========================================================================
    # 双系统模型配置（按 agent_contract.md 第 2.4 节）
    # =========================================================================
    models:
      system1:
        model_id: "gpt-4-turbo"
        purpose: "快速响应、简单查询、模式匹配"
        max_tokens: 4096
        temperature: 0.3
        priority: 1
      system2:
        model_id: "gpt-4"
        purpose: "深度推理、复杂分析、规划决策"
        max_tokens: 8192
        temperature: 0.7
        priority: 2

    # =========================================================================
    # 权限声明（按 agent_contract.md 第 2.5 节）
    # =========================================================================
    required_permissions:
      - "file:read:${AGENTOS_ROOT}/docs/*"
      - "file:write:${AGENTOS_DATA_DIR}/workspace/docs/*"
      - "agent:invoke:architect_v1"
      - "agent:invoke:coordinator_v1"

    # =========================================================================
    # 成本概览（按 agent_contract.md 第 2.6 节）
    # =========================================================================
    cost_profile:
      input_token_cost_per_1k: 0.03
      output_token_cost_per_1k: 0.06
      avg_tokens_per_task: 5000
      estimated_cost_per_task_usd: 0.15
      monthly_budget_usd: 100.0
      cost_center: "product-team"

    # =========================================================================
    # 信任指标（按 agent_contract.md 第 2.7 节）
    # =========================================================================
    trust_metrics:
      trust_score: 0.85
      reliability_score: 0.90
      quality_score: 0.88
      security_score: 0.95
      total_tasks_completed: 1250
      success_rate: 0.92
      avg_user_rating: 4.5
      last_evaluation: "2026-03-15T00:00:00Z"

    # =========================================================================
    # 资源限制
    # =========================================================================
    resource_limits:
      max_memory_mb: 512
      max_cpu_percent: 50
      timeout_sec: 300
      max_concurrent_tasks: 3

    tags:
      - "planning"
      - "coordination"
      - "analysis"
    created_at: "2026-01-01T00:00:00Z"
    updated_at: "2026-04-02T00:00:00Z"

