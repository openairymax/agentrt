# =============================================================================
# AgentOS 预发布环境配置覆盖
# 版本: v1.0.0
# 最后更新: 2026-03-23
# =============================================================================
# 此文件覆盖基础配置，用于预发布环境

_config_version: "1.0.0"
_environment: "staging"

# =============================================================================
# 内核配置覆盖
# =============================================================================
kernel:
  log_level: "info"
  
  error:
    verbose: false
  
  hot_reload:
    enabled: true
    check_interval_sec: 30
  
  monitoring:
    metrics_interval_sec: 10

# =============================================================================
# 安全配置覆盖
# =============================================================================
security:
  sandbox:
    isolation_type: "process"
  
  audit:
    retention_days: 30
  
  intrusion_detection:
    enabled: true
    anomaly_threshold: 0.7

# =============================================================================
# 日志配置覆盖
# =============================================================================
logging:
  level: "info"
  format: "json"
  
  sampling:
    enabled: false

# =============================================================================
# 模型配置覆盖
# =============================================================================
models:
  global:
    default_model: "gpt-4-turbo"
    default_retry:
      max_attempts: 3
