# =============================================================================
# AgentOS 开发环境配置覆盖
# 版本: v1.0.0
# 最后更新: 2026-03-23
# =============================================================================
# 此文件覆盖基础配置，用于开发环境

_config_version: "1.0.0"
_environment: "development"

# =============================================================================
# 内核配置覆盖
# =============================================================================
kernel:
  log_level: "debug"
  
  error:
    verbose: true
  
  hot_reload:
    enabled: true
    check_interval_sec: 10
  
  monitoring:
    metrics_interval_sec: 5

# =============================================================================
# 安全配置覆盖
# =============================================================================
security:
  sandbox:
    isolation_type: "none"  # 开发环境禁用沙箱
  
  audit:
    retention_days: 7

# =============================================================================
# 日志配置覆盖
# =============================================================================
logging:
  level: "debug"
  format: "color"
  
  hot_reload:
    enabled: true
    check_interval_sec: 10

# =============================================================================
# 模型配置覆盖
# =============================================================================
models:
  global:
    default_model: "gpt-4-turbo"
    default_retry:
      max_attempts: 1
