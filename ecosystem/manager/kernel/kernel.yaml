_config_version: "1.0.0"

kernel:
  name: "AgentRT Core"
  version: "0.1.0"
  log_level: "info"

  scheduler:
    policy: "weighted"
    time_slice_ms: 10
    max_concurrency: 100

  memory:
    pool_size_mb: 1024
    max_allocation_mb: 2048
    guard_enabled: true
    oom_policy: "reject"

  ipc:
    max_connections: 1024
    buffer_size_kb: 64
    timeout_ms: 5000
    auth_required: true
    encryption: "tls13"

  timer:
    precision_ms: 1
    max_timers: 10000

  error:
    verbose: false
    retention_days: 30

  hot_reload:
    enabled: true

  monitoring:
    enabled: true
    metrics_interval_sec: 10

  limits:
    max_file_descriptors: 65535
    max_threads: 1000