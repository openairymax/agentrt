# =============================================================================
# AgentRT cupolas Module Monitoring Configuration
# Version: 0.1.0
# Description: Prometheus alerting rules and Grafana dashboard configuration
# =============================================================================

groups:
  - name: cupolas_build_alerts
    interval: 1m
    rules:
      # Build Failure Alert
      - alert: CupolasBuildFailure
        expr: |
          github_actions_workflow_run_conclusion{
            repository="AgentRT",
            workflow="cupolas-ci.yml",
            conclusion="failure"
          } == 1
        for: 0m
        labels:
          severity: critical
          component: cupolas
          category: build
        annotations:
          summary: "cupolas module build failed"
          description: "The cupolas CI/CD pipeline has failed. Check the workflow run for details."
          runbook_url: "${RUNBOOK_BASE_URL:-https://docs.agentos.example.com}/runbooks/cupolas-build-failure"

      # Build Timeout Alert
      - alert: CupolasBuildTimeout
        expr: |
          github_actions_workflow_run_duration_minutes{
            repository="AgentRT",
            workflow="cupolas-ci.yml"
          } > 30
        for: 5m
        labels:
          severity: warning
          component: cupolas
          category: build
        annotations:
          summary: "cupolas build taking too long"
          description: "The cupolas CI/CD pipeline has been running for over 30 minutes."

      # Build Success Rate Drop
      - alert: CupolasBuildSuccessRateDrop
        expr: |
          (
            sum(rate(github_actions_workflow_run_conclusion{
              repository="AgentRT",
              workflow="cupolas-ci.yml",
              conclusion="success"
            }[1h]))
            /
            sum(rate(github_actions_workflow_run_total{
              repository="AgentRT",
              workflow="cupolas-ci.yml"
            }[1h]))
          ) < 0.8
        for: 15m
        labels:
          severity: warning
          component: cupolas
          category: build
        annotations:
          summary: "cupolas build success rate below 80%"
          description: "The cupolas module build success rate has dropped below 80% in the last hour."

  - name: cupolas_test_alerts
    interval: 1m
    rules:
      # Test Coverage Drop
      - alert: CupolasTestCoverageDrop
        expr: |
          codecov_coverage_percent{
            repository="AgentRT",
            flag="cupolas"
          } < 80
        for: 0m
        labels:
          severity: warning
          component: cupolas
          category: test
        annotations:
          summary: "cupolas test coverage below threshold"
          description: "Test coverage is {{ $value }}%, below the 80% threshold."

      # Test Failure Alert
      - alert: CupolasTestFailure
        expr: |
          ctest_tests_failed{
            module="cupolas"
          } > 0
        for: 0m
        labels:
          severity: critical
          component: cupolas
          category: test
        annotations:
          summary: "cupolas tests are failing"
          description: "{{ $value }} tests are failing in the cupolas module."

  - name: cupolas_security_alerts
    interval: 5m
    rules:
      # Critical Vulnerability Found
      - alert: CupolasCriticalVulnerability
        expr: |
          trivy_vulnerabilities{
            repository="AgentRT",
            module="cupolas",
            severity="CRITICAL"
          } > 0
        for: 0m
        labels:
          severity: critical
          component: cupolas
          category: security
        annotations:
          summary: "Critical vulnerability found in cupolas"
          description: "Found {{ $value }} critical vulnerabilities in cupolas module."

      # High Vulnerability Count
      - alert: CupolasHighVulnerabilities
        expr: |
          sum(trivy_vulnerabilities{
            repository="AgentRT",
            module="cupolas",
            severity=~"CRITICAL|HIGH"
          }) > 5
        for: 15m
        labels:
          severity: warning
          component: cupolas
          category: security
        annotations:
          summary: "Multiple high-severity vulnerabilities in cupolas"
          description: "Found {{ $value }} high/critical vulnerabilities in cupolas module."

      # Secret Detection Alert
      - alert: CupolasSecretDetected
        expr: |
          trufflehog_secrets_found{
            repository="AgentRT",
            module="cupolas"
          } > 0
        for: 0m
        labels:
          severity: critical
          component: cupolas
          category: security
        annotations:
          summary: "Secret detected in cupolas codebase"
          description: "TruffleHog detected {{ $value }} potential secrets in cupolas module."

  - name: cupolas_quality_alerts
    interval: 5m
    rules:
      # Code Quality Score Drop
      - alert: CupolasCodeQualityDrop
        expr: |
          cppcheck_error_count{module="cupolas"} > 0
        for: 0m
        labels:
          severity: warning
          component: cupolas
          category: quality
        annotations:
          summary: "Static analysis errors in cupolas"
          description: "cppcheck found {{ $value }} errors in cupolas module."

      # Code Quality Warning Threshold
      - alert: CupolasCodeQualityWarnings
        expr: |
          cppcheck_warning_count{module="cupolas"} > 10
        for: 30m
        labels:
          severity: info
          component: cupolas
          category: quality
        annotations:
          summary: "High number of static analysis warnings in cupolas"
          description: "cppcheck found {{ $value }} warnings in cupolas module."

  - name: cupolas_deployment_alerts
    interval: 1m
    rules:
      # Deployment Failure
      - alert: CupolasDeploymentFailure
        expr: |
          deployment_status{
            module="cupolas",
            status="failed"
          } == 1
        for: 0m
        labels:
          severity: critical
          component: cupolas
          category: deployment
        annotations:
          summary: "cupolas deployment failed"
          description: "Deployment of cupolas module to {{ $labels.environment }} failed."

      # Rollback Triggered
      - alert: CupolasRollbackTriggered
        expr: |
          deployment_rollback{
            module="cupolas"
          } == 1
        for: 0m
        labels:
          severity: warning
          component: cupolas
          category: deployment
        annotations:
          summary: "cupolas deployment rolled back"
          description: "A rollback was triggered for cupolas module in {{ $labels.environment }}."

      # Health Check Failure
      - alert: CupolasHealthCheckFailure
        expr: |
          health_check_status{
            module="cupolas",
            status="unhealthy"
          } == 1
        for: 2m
        labels:
          severity: critical
          component: cupolas
          category: deployment
        annotations:
          summary: "cupolas health check failing"
          description: "Health checks are failing for cupolas in {{ $labels.environment }}."

  - name: cupolas_performance_alerts
    interval: 5m
    rules:
      # Build Performance Degradation
      - alert: CupolasBuildPerformanceDegradation
        expr: |
          (
            rate(github_actions_workflow_run_duration_seconds{
              repository="AgentRT",
              workflow="cupolas-ci.yml"
            }[1h])
            -
            rate(github_actions_workflow_run_duration_seconds{
              repository="AgentRT",
              workflow="cupolas-ci.yml"
            }[1h] offset 24h)
          ) / rate(github_actions_workflow_run_duration_seconds{
            repository="AgentRT",
            workflow="cupolas-ci.yml"
          }[1h] offset 24h) > 0.5
        for: 30m
        labels:
          severity: info
          component: cupolas
          category: performance
        annotations:
          summary: "cupolas build time increased significantly"
          description: "Build time has increased by more than 50% compared to yesterday."

      # Benchmark Regression
      - alert: CupolasBenchmarkRegression
        expr: |
          benchmark_duration_seconds{
            module="cupolas"
          } > benchmark_baseline_seconds{
            module="cupolas"
          } * 1.2
        for: 0m
        labels:
          severity: warning
          component: cupolas
          category: performance
        annotations:
          summary: "Performance regression detected in cupolas"
          description: "Benchmark {{ $labels.benchmark }} shows 20%+ performance regression."
