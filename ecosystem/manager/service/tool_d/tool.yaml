# 配置归属（按双重责任模型）
_owner:
  module: "daemon"
  contact: "daemon-team@example.com"
  path: "AgentRT/agentos/daemon/tool_d"
  description: "内容定义责任归属 agentos/daemon/tool_d 模块，管理责任归属 Manager 模块"

# 配置版本
_config_version: "1.0.0"

# Schema 引用
_schema: "schema/tool-service.schema.json"

# =============================================================================
# Tool Daemon 配置
# =============================================================================
tool_d:
  # 服务名称
  name: "tool_d"
  
  # 服务版本
  version: "1.0.0"
  
  # 是否启用
  enabled: true
  
  # 服务监听地址
  bind_address: "127.0.0.1"
  
  # 服务端口
  port: 50051
  
  # 最大并发请求
  max_concurrency: 100
  
  # 请求超时（秒）
  timeout_sec: 60

  # ===========================================================================
  # 工具执行配置
  # ===========================================================================
  execution:
    # 执行模式: local, docker, wasm, remote
    mode: "local"
    
    # 沙箱配置
    sandbox:
      enabled: true
      type: "process"
      memory_limit_mb: 256
      cpu_limit: 0.5
      timeout_sec: 30
    
    # Docker 配置（当 mode 为 docker 时）
    docker:
      image: "agentos/tool-runner:latest"
      network: "none"
      read_only: true
      security_opt:
        - "no-new-privileges"
      cap_drop:
        - "ALL"
    
    # WASM 配置（当 mode 为 wasm 时）
    wasm:
      runtime: "wasmedge"
      memory_limit_mb: 128
      timeout_sec: 30

  # ===========================================================================
  # 工具缓存配置
  # ===========================================================================
  cache:
    # 是否启用缓存
    enabled: true
    
    # 缓存类型: memory, redis, file
    type: "memory"
    
    # 内存缓存配置
    memory:
      max_size_mb: 64
      ttl_sec: 300
    
    # Redis 缓存配置
    redis:
      host: "${REDIS_HOST:-localhost}"
      port: ${REDIS_PORT:-6379}
      db: ${REDIS_DB:-0}
      ttl_sec: 300
    
    # 文件缓存配置
    file:
      dir: "${AGENTOS_CACHE_DIR}/tool_d"
      max_size_mb: 512
      ttl_sec: 600

  # ===========================================================================
  # 工具权限配置
  # ===========================================================================
  permissions:
    # 默认权限规则
    default_rule: "deny"
    
    # 权限检查
    check_enabled: true
    
    # 权限审计
    audit_enabled: true

  # ===========================================================================
  # 工具日志配置
  # ===========================================================================
  logging:
    # 是否启用日志
    enabled: true
    
    # 是否记录输入（安全考虑，默认关闭）
    log_input: false
    
    # 是否记录输出
    log_output: true
    
    # 是否记录执行时长
    log_duration: true
    
    # 敏感字段掩码
    mask_fields:
      - "password"
      - "token"
      - "api_key"
      - "secret"

  # ===========================================================================
  # 工具健康检查
  # ===========================================================================
  health_check:
    # 是否启用健康检查
    enabled: true
    
    # 检查间隔（秒）
    interval_sec: 30
    
    # 超时时间（秒）
    timeout_sec: 5
    
    # 不健康阈值
    unhealthy_threshold: 3

  # ===========================================================================
  # 工具限流配置
  # ===========================================================================
  rate_limit:
    # 是否启用限流
    enabled: true
    
    # 每秒最大请求数
    requests_per_sec: 100
    
    # 每分钟最大请求数
    requests_per_min: 1000
    
    # 突发容量
    burst: 50

  # ===========================================================================
  # 工具重试配置
  # ===========================================================================
  retry:
    # 是否启用重试
    enabled: true
    
    # 最大重试次数
    max_attempts: 3
    
    # 初始退避时间（毫秒）
    backoff_ms: 100
    
    # 退避倍数
    backoff_multiplier: 2.0
    
    # 最大退避时间（毫秒）
    max_backoff_ms: 5000

  # ===========================================================================
  # 内置工具配置
  # ===========================================================================
  builtin_tools:
    # 文件操作工具
    filesystem:
      enabled: true
      timeout_sec: 30
      max_file_size_mb: 100
    
    # Shell 执行工具
    shell:
      enabled: true
      timeout_sec: 60
      allowed_commands:
        - "ls"
        - "cat"
        - "grep"
        - "find"
        - "head"
        - "tail"
    
    # HTTP 请求工具
    http:
      enabled: true
      timeout_sec: 30
      max_response_size_mb: 10
    
    # 代码执行工具
    code:
      enabled: true
      timeout_sec: 120
      languages:
        - "python"
        - "javascript"
        - "bash"

  # ===========================================================================
  # 热更新配置
  # ===========================================================================
  hot_reload:
    enabled: true
    check_interval_sec: 30
