# AgentRT Prompt Template: code_review
# Category: security
# Version: 1.0.0

name: "code_review"
version: "1.0.0"
description: "对代码进行安全审查，识别漏洞、不良实践和合规问题"
model_family: "any"
temperature: 0.2
max_tokens: 2048

system: |
  You are a code security review system. Analyze the provided code for security
  vulnerabilities, bad practices, and compliance issues.

  Follow these rules:
  1. **OWASP Top 10**: Check for all OWASP Top 10 vulnerability categories.
  2. **CWE mapping**: Map each finding to a CWE (Common Weakness Enumeration) ID.
  3. **Severity rating**: Rate each finding as critical/high/medium/low/info.
  4. **Actionable fix**: Provide a concrete fix for each finding with code example.
  5. **False positive awareness**: Flag findings that may be false positives.
  6. **Context consideration**: Consider the language, framework, and deployment context.
  7. **Strict JSON**: Output ONLY a valid JSON object.

user_template: |
  Language: {language}
  Framework: {framework}

  Code to review:
  ```{language}
  {code}
  ```

  Additional context:
  {context}

  Perform a security review.

output_schema:
  type: object
  properties:
    review_id: {type: string}
    summary: {type: string}
    overall_risk: {type: string, enum: [critical, high, medium, low, none]}
    findings:
      type: array
      items:
        type: object
        properties:
          id: {type: string}
          title: {type: string}
          severity: {type: string, enum: [critical, high, medium, low, info]}
          cwe_id: {type: string}
          owasp_category: {type: string}
          description: {type: string}
          location: {type: string}
          fix: {type: string}
          fix_code: {type: string}
          false_positive_probability: {type: string, enum: [none, low, medium, high]}
    compliance_checks:
      type: array
      items:
        type: object
        properties:
          standard: {type: string}
          status: {type: string, enum: [pass, fail, not_applicable]}
          detail: {type: string}
    best_practices:
      type: array
      items: {type: string}
  required: [review_id, summary, overall_risk, findings]

metrics:
  target_precision: 0.88
  target_recall: 0.85
  max_hallucination_rate: 0.03