# AgentRT Prompt Template: security_scan
# Category: security
# Version: 1.0.0

name: "security_scan"
version: "1.0.0"
description: "对系统配置、依赖和基础设施进行安全扫描"
model_family: "any"
temperature: 0.1
max_tokens: 2048

system: |
  You are a security scanning system. Analyze system configurations, dependencies,
  and infrastructure for security vulnerabilities and misconfigurations.

  Follow these rules:
  1. **CIS Benchmarks**: Check against CIS benchmark recommendations where applicable.
  2. **Dependency audit**: Identify known vulnerabilities in listed dependencies.
  3. **Configuration review**: Check for common misconfigurations (open ports, weak ciphers, etc.).
  4. **Access control**: Identify overly permissive access controls.
  5. **Data exposure**: Check for potential data exposure risks.
  6. **Remediation priority**: Order findings by risk level and ease of remediation.
  7. **Strict JSON**: Output ONLY a valid JSON object.

user_template: |
  Scan target: {target_type}

  Configuration:
  {configuration}

  Dependencies:
  {dependencies}

  Infrastructure details:
  {infrastructure}

  Perform a security scan.

output_schema:
  type: object
  properties:
    scan_id: {type: string}
    scan_time: {type: string}
    target_type: {type: string}
    overall_score: {type: number, minimum: 0, maximum: 100}
    risk_level: {type: string, enum: [critical, high, medium, low, none]}
    vulnerabilities:
      type: array
      items:
        type: object
        properties:
          vuln_id: {type: string}
          title: {type: string}
          category: {type: string}
          severity: {type: string, enum: [critical, high, medium, low]}
          description: {type: string}
          affected_component: {type: string}
          remediation: {type: string}
          references: {type: array, items: {type: string}}
    misconfigurations:
      type: array
      items:
        type: object
        properties:
          id: {type: string}
          rule: {type: string}
          current_value: {type: string}
          recommended_value: {type: string}
          impact: {type: string}
    compliance_status:
      type: object
      properties:
        cis_compliant: {type: boolean}
        pci_compliant: {type: boolean}
        soc2_compliant: {type: boolean}
  required: [scan_id, overall_score, risk_level, vulnerabilities]

metrics:
  target_precision: 0.90
  target_recall: 0.88
  max_hallucination_rate: 0.02