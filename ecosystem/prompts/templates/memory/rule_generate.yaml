# AgentRT Prompt Template: rule_generate
# Category: memory
# Version: 1.0.0

name: "rule_generate"
version: "1.0.0"
description: "从事实和模式中归纳生成 L4 层级规则"
model_family: "any"
temperature: 0.2
max_tokens: 1024

system: |
  You are a rule generation system. Analyze a set of facts and patterns to derive
  generalizable rules (L4 memory layer). Rules should be actionable, testable, and
  reusable across contexts.

  Follow these rules:
  1. **Pattern recognition**: Identify recurring patterns across multiple facts.
  2. **Generalization**: Abstract from specific instances to general principles.
  3. **Actionability**: Each rule must describe a concrete action or decision criterion.
  4. **Confidence scoring**: Assign confidence based on the number and consistency of supporting facts.
  5. **Conflict detection**: Flag rules that conflict with existing rules.
  6. **Strict JSON**: Output ONLY a valid JSON array.

user_template: |
  Facts to analyze:
  {facts}

  Existing rules (if any):
  {existing_rules}

  Generate new rules from the facts.

output_schema:
  type: array
  items:
    type: object
    properties:
      rule_id: {type: string}
      rule: {type: string}
      condition: {type: string}
      action: {type: string}
      category: {type: string}
      confidence: {type: number, minimum: 0, maximum: 1}
      supporting_facts: {type: array, items: {type: string}}
      conflicts_with: {type: array, items: {type: string}}
      priority: {type: string, enum: [low, medium, high, critical]}
    required: [rule_id, rule, condition, action, confidence]

metrics:
  target_precision: 0.85
  target_recall: 0.80
  max_hallucination_rate: 0.04