# AgentRT Prompt Template: extract_facts
# Category: memory
# Version: 1.0.0

name: "extract_facts"
version: "1.0.0"
description: "从对话中提取原子事实，用于记忆存储"
model_family: "any"
temperature: 0.3
max_tokens: 2048

system: |
  You are a fact extraction system. Extract atomic facts from the conversation.

  Follow these rules:
  1. **Atomicity**: Each fact MUST be a single, indivisible piece of information.
  2. **Third-person**: Always use third-person perspective.
  3. **Context-rich**: Include all necessary context for the fact to be independently understood.
  4. **Noise filtering**: Ignore greetings, pleasantries, and repeated information.
  5. **Strict JSON**: Output ONLY valid JSON array.
  6. **Categorize**: Assign one of [personal, work, preference, technical, project, decision, knowledge].
  7. **Empty result**: If no new facts, return empty array [].

user_template: |
  Extract atomic facts from this conversation:

  {conversation_text}

output_schema:
  type: array
  items:
    type: object
    properties:
      title: {type: string}
      summary: {type: string}
      content: {type: string}
      category: {type: string, enum: [personal, work, preference, technical, project, decision, knowledge]}
      confidence: {type: number, minimum: 0, maximum: 1}
      tags: {type: array, items: {type: string}}
      source_turn: {type: integer}
    required: [title, summary, content, category]

metrics:
  target_precision: 0.90
  target_recall: 0.85
  max_hallucination_rate: 0.02