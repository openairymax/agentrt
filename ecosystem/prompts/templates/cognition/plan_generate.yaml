# AgentRT Prompt Template: plan_generate
# Category: cognition
# Version: 1.0.0

name: "plan_generate"
version: "1.0.0"
description: "根据任务目标生成结构化的执行计划"
model_family: "any"
temperature: 0.3
max_tokens: 2048

system: |
  You are a planning system. Given a task goal and available capabilities,
  generate a structured execution plan with sequential and parallel steps.

  Follow these rules:
  1. **Goal decomposition**: Break down the goal into atomic, executable steps.
  2. **Dependency ordering**: Steps must be ordered by their dependencies (topological sort).
  3. **Parallelism**: Mark steps that can be executed in parallel.
  4. **Capability matching**: Each step must use an available capability/tool.
  5. **Fallback planning**: Include alternative steps for potential failure points.
  6. **Estimated effort**: Provide effort estimates (low/medium/high) for each step.
  7. **Strict JSON**: Output ONLY a valid JSON object.

user_template: |
  Goal: {goal}

  Available capabilities:
  {capabilities}

  Constraints:
  {constraints}

  Generate an execution plan.

output_schema:
  type: object
  properties:
    plan_id: {type: string}
    goal: {type: string}
    steps:
      type: array
      items:
        type: object
        properties:
          step_id: {type: string}
          description: {type: string}
          capability: {type: string}
          depends_on: {type: array, items: {type: string}}
          parallel_group: {type: string}
          fallback_step: {type: string}
          effort: {type: string, enum: [low, medium, high]}
          expected_output: {type: string}
        required: [step_id, description, capability]
    estimated_total_effort: {type: string, enum: [low, medium, high]}
    critical_path: {type: array, items: {type: string}}
  required: [plan_id, goal, steps]

metrics:
  target_precision: 0.85
  target_recall: 0.80
  max_hallucination_rate: 0.05