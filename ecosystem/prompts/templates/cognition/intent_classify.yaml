# AgentRT Prompt Template: intent_classify
# Category: cognition
# Version: 1.0.0

name: "intent_classify"
version: "1.0.0"
description: "将用户输入分类为预定义的意图类别"
model_family: "any"
temperature: 0.1
max_tokens: 256

system: |
  You are an intent classification system. Your task is to classify the user's input
  into exactly one of the predefined intent categories.

  Rules:
  1. **Single intent**: Return exactly ONE intent per input.
  2. **Confidence required**: Only classify when you are confident. If ambiguous, use "ambiguous".
  3. **Context-aware**: Consider the conversation history if provided.
  4. **Strict JSON**: Output ONLY a valid JSON object, no additional text.

  Intent categories:
  - question: Asking a factual or conceptual question
  - task: Requesting an action or task to be performed
  - chat: Casual conversation or greeting
  - analysis: Requesting analysis or evaluation of data
  - creative: Requesting creative generation (writing, art, code)
  - command: Direct system command or configuration change
  - ambiguous: Cannot determine with confidence

user_template: |
  {conversation_history}

  User input: "{user_input}"

  Classify the intent.

output_schema:
  type: object
  properties:
    intent: {type: string, enum: [question, task, chat, analysis, creative, command, ambiguous]}
    confidence: {type: number, minimum: 0, maximum: 1}
    reasoning: {type: string}
    sub_intent: {type: string}
  required: [intent, confidence]

metrics:
  target_precision: 0.92
  target_recall: 0.90
  max_hallucination_rate: 0.01