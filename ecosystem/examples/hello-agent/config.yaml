# hello-agent 运行时配置
# AgentRT 最小可运行配置

# ─── 网关配置 ───
gateway_url: "http://127.0.0.1:8080"

# ─── 默认模型 ───
default_model: "gpt-4"

# ─── LLM 提供商 ───
llm:
  default_provider: "openai"
  providers:
    openai:
      type: "openai"
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://api.openai.com/v1"

# ─── 记忆系统（入门级示例暂不启用） ───
memory:
  enabled: false

# ─── 安全配置 ───
security:
  enabled: true
  mode: "standard"

# ─── Agent 加载路径 ───
agents:
  - "agents/main.agent.yaml"
