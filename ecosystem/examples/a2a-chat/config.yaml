# A2A Chat 示例配置
# 演示两个 Agent 通过 A2A 协议进行通信

# 对话主题
topic: "如何设计一个优秀的AI助手产品"

# A2A 通信配置
a2a:
  # 通信模式：sync（同步）/ async（异步）/ stream（流式）
  mode: sync

  # 消息格式
  message_format: text

  # 超时设置
  timeout: 30

  # 最大对话轮次
  max_rounds: 5

# Agent 注册
agents:
  agent_a:
    config: agents/chat_agent_a.agent.yaml
    # 服务端口
    port: 8001
    # 启动后自动注册到 A2A 网络
    auto_register: true

  agent_b:
    config: agents/chat_agent_b.agent.yaml
    port: 8002
    auto_register: true

# 对话流程
flow:
  # 步骤1：Agent A 发起对话
  - from: agent_a
    to: agent_b
    action: send_message
    content: "你好！我想和你讨论一下如何设计一个优秀的AI助手产品。从技术架构角度，我认为模块化设计是关键，你怎么看？"

  # 步骤2：Agent B 回复
  - from: agent_b
    to: agent_a
    action: send_message
    content: "{response}"  # 自动填充 Agent B 的回复

  # 步骤3：Agent A 继续讨论
  - from: agent_a
    to: agent_b
    action: send_message
    content: "{response}"

  # 步骤4：Agent B 总结
  - from: agent_b
    to: agent_a
    action: send_message
    content: "{response}"

# 运行时配置
runtime:
  max_retries: 3
  timeout: 60
  log_level: info
