# research-agent 运行时配置
# 演示多 Agent 协作 + 记忆持久化

# ─── 网关配置 ───
gateway_url: "http://127.0.0.1:8080"

# ─── 默认模型 ───
default_model: "gpt-4"

# ─── LLM 提供商 ───
llm:
  default_provider: "openai"
  providers:
    openai:
      type: "openai"
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://api.openai.com/v1"

# ─── 多 Agent 配置 ───
multi_agent:
  enabled: true
  max_concurrent_agents: 8
  communication:
    protocol: "a2a"
  collaboration:
    default_pattern: "orchestrator"
  lanes:
    enabled: true
    default_isolation: "process"

# ─── 记忆系统（四层全开） ───
memory:
  enabled: true
  mode: "full"
  storage_path: "./data/research_memory"
  layers:
    l1:
      # 工作记忆：当前对话上下文
      compression: "zstd"
    l2:
      # 语义记忆：向量化知识检索
      embedder: "openai"
      embedding_dim: 1536
    l3:
      # 实体记忆：结构化实体和关系
      enabled: true
      max_entities: 50000
    l4:
      # 情景记忆：经验模式和规则
      enabled: true
      clustering_algorithm: "hdbscan"

# ─── 安全配置 ───
security:
  enabled: true
  mode: "standard"
  default_policy: "deny"

# ─── Agent 加载路径 ───
agents:
  - "agents/research_coordinator.agent.yaml"
  - "agents/research.agent.yaml"
