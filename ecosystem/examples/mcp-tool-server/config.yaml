# MCP 工具服务器示例配置
# 演示如何通过 AgentRT 连接自定义 MCP 工具服务器

agent:
  name: mcp-tool-agent
  version: "1.0.0"
  model: gpt-4o
  system_prompt: |
    你是一个拥有计算和文件读取能力的 Agent。
    你可以使用计算器工具进行数学运算，使用文件读取工具查看文件内容。
    请根据用户需求选择合适的工具。

# MCP 服务器配置
mcp_servers:
  - name: my-tools
    description: "自定义工具服务器，提供计算器和文件读取工具"
    # 传输方式：stdio / sse / websocket
    transport: stdio
    # 启动命令
    command: python
    args:
      - server/tool_server.py
    # 环境变量
    env: {}

  # SSE 传输方式示例（远程服务器）
  # - name: remote-tools
  #   transport: sse
  #   url: http://localhost:8080/mcp

# 运行时配置
runtime:
  max_retries: 3
  timeout: 30
  log_level: info
