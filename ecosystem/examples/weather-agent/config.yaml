# weather-agent 运行时配置
# 演示自定义工具 + MCP 协议

# ─── 网关配置 ───
gateway_url: "http://127.0.0.1:8080"

# ─── 默认模型 ───
default_model: "gpt-4"

# ─── LLM 提供商 ───
llm:
  default_provider: "openai"
  providers:
    openai:
      type: "openai"
      api_key_env: "OPENAI_API_KEY"
      base_url: "https://api.openai.com/v1"

# ─── MCP 协议配置 ───
gateway:
  mcp:
    enabled: true
    enable_progress: true
    enable_cancellation: true

# ─── 记忆系统 ───
memory:
  enabled: true
  mode: "lite"
  storage_path: "./data/weather_memory"

# ─── 安全配置 ───
security:
  enabled: true
  mode: "standard"

# ─── 工具发现路径 ───
plugins:
  enabled: true
  plugin_dirs:
    - "tools/"

# ─── Agent 加载路径 ───
agents:
  - "agents/weather.agent.yaml"
