# API Documentation Auto-Generate & Publish
#
# v1.1: Updated actions-gh-pages to v4, added Doxyfile existence check

name: API Docs (Doxygen)

on:
  push:
    branches: [ main ]
    paths:
      - 'agentos/**/*.h'
      - 'agentos/**/*.c'
      - 'Doxyfile'
      - 'docs/api/**'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

env:
  MAX_WARNINGS: 200
  DOC_OUTPUT_DIR: docs/api/html

jobs:
  generate-docs:
    name: Generate Doxygen API Docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Doxyfile exists
        id: check
        run: |
          if [ -f "Doxyfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Doxyfile not found, skipping documentation generation"
          fi

      - name: Install Doxygen and dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            doxygen \
            graphviz \
            fonts-noto-cjk \
            plantuml

      - name: Verify Doxygen version
        if: steps.check.outputs.exists == 'true'
        run: |
          doxygen --version
          dot -V

      - name: Create output directory
        if: steps.check.outputs.exists == 'true'
        run: mkdir -p ${{ env.DOC_OUTPUT_DIR }}

      - name: Generate API documentation
        if: steps.check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          echo "Generating AgentOS API documentation..."
          doxygen Doxyfile 2>&1 | tee docs/api/doxygen_output.log || true

      - name: Analyze documentation warnings
        if: steps.check.outputs.exists == 'true'
        id: warnings
        continue-on-error: true
        run: |
          if [ -f docs/api/doxygen_warnings.log ]; then
            WARNING_COUNT=$(wc -l < docs/api/doxygen_warnings.log)
            echo "count=$WARNING_COUNT" >> $GITHUB_OUTPUT
            echo "Found $WARNING_COUNT documentation warnings"

            if [ "$WARNING_COUNT" -gt ${{ env.MAX_WARNINGS }} ]; then
              echo "::warning::Documentation warnings ($WARNING_COUNT) exceed threshold (${{ env.MAX_WARNINGS }})"
            fi
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "No documentation warnings"
          fi

      - name: Upload documentation artifacts
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-docs-${{ github.run_id }}
          path: |
            ${{ env.DOC_OUTPUT_DIR }}/
            docs/api/doxygen_warnings.log
            docs/api/doxygen_output.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Documentation quality gate
        if: steps.check.outputs.exists == 'true'
        run: |
          WARNING_COUNT=${{ steps.warnings.outputs.count || '0' }}
          echo "## Documentation Quality Gate" >> $GITHUB_STEP_SUMMARY
          echo "Warnings: $WARNING_COUNT (threshold: ${{ env.MAX_WARNINGS }})" >> $GITHUB_STEP_SUMMARY

  publish-docs:
    name: Publish to GitHub Pages
    needs: generate-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-docs-${{ github.run_id }}
          path: docs/api/
        continue-on-error: true

      - name: Check artifacts exist
        id: check
        run: |
          if [ -d "docs/api/html" ] && [ "$(ls -A docs/api/html 2>/dev/null)" ]; then
            echo "has_docs=true" >> $GITHUB_OUTPUT
          else
            echo "has_docs=false" >> $GITHUB_OUTPUT
            echo "No documentation artifacts found, regenerating..."
          fi

      - name: Install Doxygen
        if: steps.check.outputs.has_docs == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends doxygen graphviz fonts-noto-cjk

      - name: Regenerate docs for publishing
        if: steps.check.outputs.has_docs == 'false'
        continue-on-error: true
        run: |
          if [ -f "Doxyfile" ]; then
            doxygen Doxyfile
          fi

      - name: Publish to GitHub Pages
        if: steps.check.outputs.has_docs == 'true' || steps.check.outputs.has_docs == 'false'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api/html
          publish_branch: gh-pages
          destination_dir: api-docs
          user_name: 'AgentOS CI'
          user_email: 'ci@spharx.cn'
          commit_message: 'docs: update API documentation (${{ github.sha }})'
