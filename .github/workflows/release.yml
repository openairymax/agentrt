# AgentOS Release v3.0 - 发布+桌面客户端构建
# align: 工程规范化标准手册 v10.15
# trigger: tag推送(v*) + manual
# v3.0: 合并release.yml + build-desktop.yml

name: Release v3.0

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc.*'
      - 'v*.*.*-beta.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.4.0)'
        required: true
      release_type:
        description: 'Release type'
        required: false
        default: 'stable'
        type: choice
        options: [stable, beta, rc]

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # Job 1: Build C Core + Package
  # ============================================================
  build-core:
    name: "Build C Core"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake gcc g++ make \
            libcurl4-openssl-dev libjson-c-dev \
            libmicrohttpd-dev libssl-dev 2>/dev/null || true

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "RELEASE_VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -S . -B AgentOS-build -DBUILD_DAEMON=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build AgentOS-build -j$(nproc)

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          tar czf artifacts/agentos-core-${{ steps.version.outputs.version }}.tar.gz \
            AgentOS-build/agentos/lib/*.a \
            AgentOS-build/agentos/bin/* 2>/dev/null || true
          # Python SDK
          if [ -d "agentos/toolkit/python" ]; then
            tar czf artifacts/agentos-sdk-python-${{ steps.version.outputs.version }}.tar.gz \
              -C agentos/toolkit/python . --exclude=__pycache__ 2>/dev/null || true
          fi
          # Go SDK
          if [ -d "agentos/toolkit/go" ]; then
            tar czf artifacts/agentos-sdk-go-${{ steps.version.outputs.version }}.tar.gz \
              -C agentos/toolkit/go . 2>/dev/null || true
          fi
          # Rust SDK
          if [ -d "agentos/toolkit/rust" ]; then
            cd agentos/toolkit/rust && cargo build --release 2>/dev/null || true
            cd ../../..
          fi
          # TypeScript SDK
          if [ -d "agentos/toolkit/typescript" ]; then
            tar czf artifacts/agentos-sdk-ts-${{ steps.version.outputs.version }}.tar.gz \
              -C agentos/toolkit/typescript src/ package.json tsconfig.json 2>/dev/null || true
          fi
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 90

  # ============================================================
  # Job 2: Desktop Client Build (if exists)
  # ============================================================
  build-desktop:
    name: "Desktop Client"
    runs-on: ubuntu-latest
    needs: build-core
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check desktop client source
        id: check
        run: |
          if [ -f "scripts/desktop-client/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Desktop client source not found, skipping"
          fi
      - name: Build (placeholder)
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Desktop client build placeholder - Tauri build requires Node.js 20 + Rust"
          echo "Run on desktop-specific runners with full webkit2gtk dependencies"

  # ============================================================
  # Job 3: Create GitHub Release
  # ============================================================
  create-release:
    name: "Create GitHub Release"
    needs: [build-core, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Generate changelog
        run: |
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~20")..HEAD \
            --oneline --no-merges 2>/dev/null | while read line; do
            echo "- $line" >> changelog.md
          done || echo "Initial release" > changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false
