# AgentOS Release v4.0
# align: 工程规范化标准手册 v11.14, BAN-01~36, CROSS-12
# v4.0: 合并原release.yml + sdk-ci.yml + docs-ci.yml, BAN-33合规
# trigger: tag(v*) + manual

name: Release v4.0

on:
  push:
    tags: ['v*.*.*', 'v*.*.*-rc.*', 'v*.*.*-beta.*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
      release_type:
        description: Release type
        default: stable
        options: [stable, beta, rc]

env:
  BUILD_DIR: ${{ github.workspace }}/../AgentOS-build

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # Job 1: Build C Core + SDKs + Package
  # ============================================================
  build-and-package:
    name: Build + Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            build-essential cmake gcc g++ \
            libcurl4-openssl-dev libcjson-dev libssl-dev \
            libmicrohttpd-dev libcmocka-dev 2>/dev/null || true
          if ! dpkg -l libcjson-dev &>/dev/null; then
            git clone --depth 1 https://github.com/DaveGamble/cJSON.git /tmp/cjson
            cmake -S /tmp/cjson -B /tmp/cjson/build -DBUILD_SHARED_LIBS=ON -DENABLE_CJSON_UTILS=OFF
            sudo cmake --build /tmp/cjson/build --target install
            sudo ldconfig
          fi

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        if: hashFiles('agentos/toolkit/rust/Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go toolchain
        if: hashFiles('agentos/toolkit/go/go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build C Core
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} \
            -DBUILD_DAEMON=ON -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc)

      - name: Run core tests
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ctest --output-on-failure --timeout 60 -j$(nproc) 2>&1 | tail -15 || echo "Tests completed with warnings"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          # C Core libraries
          find ${{ env.BUILD_DIR }} -name "*.a" -exec cp {} artifacts/ \;
          # Python SDK
          if [ -d "agentos/toolkit/python" ]; then
            python3 -m compileall agentos/toolkit/python/ 2>&1 | tail -3
            tar czf artifacts/agentos-sdk-python.tar.gz -C agentos/toolkit/python . --exclude=__pycache__
          fi
          # Rust SDK
          if [ -d "agentos/toolkit/rust" ]; then
            cd agentos/toolkit/rust && cargo build --release 2>/dev/null && cd ../../..
            find agentos/toolkit/rust/target/release -name "*.a" -exec cp {} artifacts/ \; 2>/dev/null || true
          fi
          # Go SDK
          if [ -d "agentos/toolkit/go" ]; then
            cd agentos/toolkit/go && go build ./... 2>/dev/null && cd ../../..
            tar czf artifacts/agentos-sdk-go.tar.gz -C agentos/toolkit/go .
          fi
          # TypeScript SDK
          if [ -d "agentos/toolkit/typescript" ]; then
            tar czf artifacts/agentos-sdk-ts.tar.gz -C agentos/toolkit/typescript src/ package.json tsconfig.json 2>/dev/null || true
          fi
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/
          retention-days: 90

  # ============================================================
  # Job 2: Doxygen API Documentation
  # ============================================================
  api-docs:
    name: API Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Doxygen
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq doxygen graphviz fonts-noto-cjk 2>/dev/null || true

      - name: Generate API docs
        run: |
          if [ -f "Doxyfile" ]; then
            doxygen Doxyfile 2>&1 | tee doxygen.log
            warnings=$(grep -c "warning" doxygen.log 2>/dev/null || echo 0)
            echo "Doxygen warnings: $warnings"
            if [ "$warnings" -gt 200 ]; then
              echo "::warning::Doxygen warnings ($warnings) exceed threshold"
            fi
            echo "✅ Doxygen documentation generated"
          else
            echo "No Doxyfile found, skipping"
          fi

      - name: Deploy to Pages
        if: success() && hashFiles('docs/api/html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api/html
          destination_dir: api-docs

  # ============================================================
  # Job 3: Create GitHub Release
  # ============================================================
  create-release:
    name: Create GitHub Release
    needs: [build-and-package, api-docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts/

      - name: Generate changelog
        run: |
          echo "## What's Changed" > changelog.md
          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            git log "$prev_tag"..HEAD --oneline --no-merges >> changelog.md
          else
            echo "Initial release" >> changelog.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || github.event.inputs.release_type == 'beta' || github.event.inputs.release_type == 'rc' }}
