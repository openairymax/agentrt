name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      strict:
        description: 'Strict mode (fail on any issue)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-metrics:
    name: Code Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate metrics
        run: |
          echo "## Code Metrics Report" >> $GITHUB_STEP_SUMMARY

          TOTAL_LOC=$(find agentos \( -name '*.c' -o -name '*.h' \) -type f 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          TOTAL_FILES=$(find agentos \( -name '*.c' -o -name '*.h' \) -type f 2>/dev/null | wc -l)

          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| C Source Files | ${TOTAL_FILES:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| C Lines of Code | ${TOTAL_LOC:-0} |" >> $GITHUB_STEP_SUMMARY

  quality-gate-script:
    name: Quality Gate (Script)
    runs-on: ubuntu-latest
    needs: code-metrics

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install quality tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cppcheck clang-format shellcheck python3 2>/dev/null || true

      - name: Run quality gate script
        continue-on-error: true
        run: |
          SCRIPT="scripts/pipeline/quality-gate.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            bash "$SCRIPT" ${{ github.event.inputs.strict == 'true' && '--strict' || '' }}
          else
            echo "Quality gate script not found, running inline checks..."

            echo "=== Basic quality checks ==="

            echo "--- C/C++ Static Analysis ---"
            if command -v cppcheck &>/dev/null; then
              cppcheck --enable=all --suppress=missingIncludeSystem \
                --error-exitcode=0 --quiet \
                agentos/ 2>&1 | head -30 || true
            else
              echo "cppcheck not available"
            fi

            echo "--- Shell Script Quality ---"
            find scripts/ -name "*.sh" -exec bash -n {} \; 2>&1 | head -20 || true

            echo "--- Security: Hardcoded secrets ---"
            grep -rnE "(password|api_key|secret)\s*=\s*['\"][^'\"]{10,}['\"]" \
              --include="*.c" --include="*.h" --include="*.py" --include="*.sh" \
              agentos/ scripts/ 2>/dev/null | head -10 || echo "No secrets detected"
          fi

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: ci-artifacts/quality-report.json
          retention-days: 14
          if-no-files-found: ignore
