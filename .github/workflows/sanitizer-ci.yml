# =============================================================================
# sanitizer-ci.yml — AgentRT Sanitizer CI Pipeline (SEC-05)
# Phase 2.5: 内存安全四层防御体系 — Tier2 检测层自动化
# 触发: push to main/develop + PR
# 执行: ASan+LSan build + test + Valgrind memcheck (weekly)
# =============================================================================

name: AgentRT Sanitizer CI

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每周日 02:00 UTC 运行完整 Valgrind 检查 (SEC-06)
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  group: sanitizer-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  CC: gcc-13
  CXX: g++-13

jobs:
  # ===========================================================================
  # Job 1: ASan + LSan 构建 & 测试 (每次提交触发)
  # ===========================================================================
  asan-lsan-build:
    name: ASan+LSan Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            gcc-13 g++-13 \
            libsqlite3-dev libcurl4-openssl-dev \
            libyaml-dev libssl-dev \
            libmicrohttpd-dev libevent-dev \
            libcjson-dev valgrind

      - name: Configure with ASan+LSan
        run: |
          cmake -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=ON \
            -DBUILD_TESTS=ON \
            -DAGENTOS_COMPLIANCE_STRICT=OFF \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja
        env:
          ASAN_OPTIONS: "halt_on_error=1:detect_stack_use_after_return=1:detect_leaks=1:detect_container_overflow=1"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/agentos/manager/sanitizer/lsan-suppressions"

      - name: Build with sanitizers
        run: |
          cmake --build build-asan --parallel $(nproc) 2>&1 | tee build-asan.log
        env:
          ASAN_OPTIONS: "detect_stack_use_after_return=1:detect_leaks=1"

      - name: Run tests under ASan+LSan
        run: |
          cd build-asan && ctest --output-on-failure --timeout 300 -j$(nproc) 2>&1 | tee test-asan.log
        env:
          ASAN_OPTIONS: "halt_on_error=1:detect_stack_use_after_return=1:detect_leaks=1:detect_odr_violation=0"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/agentos/manager/sanitizer/lsan-suppressions:exit_code=0"

      - name: Check ASan report
        if: always()
        run: |
          echo "=== ASan Build Log Summary ==="
          grep -cE "(ERROR|SUMMARY|error:)" build-asan.log || echo "No errors in build log"
          echo ""
          echo "=== ASan Test Summary ==="
          grep -cE "(SUMMARY|LeakSummary|ERROR)" test-asan.log || echo "No sanitizer reports in test log"

      - name: Upload ASan artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report-${{ github.run_id }}
          path: |
            build-asan.log
            test-asan.log
          retention-days: 7

  # ===========================================================================
  # Job 2: UBSan 构建 & 测试 (每次提交触发)
  # ===========================================================================
  ubsan-build:
    name: UBSan Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            gcc-13 g++-13 \
            libsqlite3-dev libcurl4-openssl-dev

      - name: Configure with UBSan only
        run: |
          cmake -B build-ubsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTOS_ENABLE_ASAN=OFF \
            -DAGENTOS_ENABLE_LSAN=OFF \
            -DAGENTOS_ENABLE_UBSAN=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -G Ninja

      - name: Build with UBSan
        run: cmake --build build-ubsan --parallel $(nproc)

      - name: Run tests under UBSan
        run: cd build-ubsan && ctest --output-on-failure --timeout 300 -j$(nproc)
        env:
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

  # ===========================================================================
  # Job 3: Valgrind Memcheck (每周定时 / 手动触发) — SEC-06
  # ===========================================================================
  valgrind-memcheck:
    name: Valgrind Memcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            gcc-13 g++-13 valgrind \
            libsqlite3-dev libcurl4-openssl-dev \
            libyaml-dev libssl-dev

      - name: Configure for Valgrind (no sanitizers)
        run: |
          cmake -B build-valgrind \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -DBUILD_TESTS=ON \
            -DAGENTOS_COMPLIANCE_STRICT=OFF \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -G Ninja

      - name: Build (debug symbols required by Valgrind)
        run: cmake --build build-valgrind --parallel $(nproc)

      - name: Run Valgrind memcheck on test suite
        run: |
          cd build-valgrind
          # 获取所有可执行测试
          TESTS=$(ctest -N 2>/dev/null | awk -F'#' '{print $2}' | tr -d ' ')
          FAILED=0
          PASSED=0
          for test_bin in $TESTS; do
            if [ -f "$test_bin" ] || [ -f "./$test_bin" ]; then
              echo "--- Running Valgrind on: $test_bin ---"
              if valgrind \
                --tool=memcheck \
                --leak-check=full \
                --show-leak-kinds=all \
                --track-origins=yes \
                --error-exitcode=1 \
                --suppressions="${{ github.workspace }}/agentos/manager/sanitizer/valgrind-suppressions" \
                ./$test_bin 2>valgrind-$test_bin.log; then
                ((PASSED++))
              else
                echo "FAIL: $test_bin"
                cat valgrind-$test_bin.log
                ((FAILED++))
              fi
            fi
          done
          echo ""
          echo "=== Valgrind Summary: $PASSED passed, $FAILED failed ==="
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Upload Valgrind artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report-${{ github.run_id }}
          path: build-valgrind/valgrind-*.log
          retention-days: 14

  # ===========================================================================
  # Job 4: BAN 规则扫描 (forbidden_functions.sh) — SEC-07
  # ===========================================================================
  ban-rule-scan:
    name: BAN Rule Scan (BAN-151~BAN-180)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run forbidden_functions.sh
        run: |
          chmod +x scripts/ci/verify/forbidden_functions.sh
          bash scripts/ci/verify/forbidden_functions.sh .
        continue-on-error: false

      - name: Run quality-gate.sh (memory safety gates)
        run: |
          chmod +x scripts/ci/pipeline/quality-gate.sh
          bash scripts/ci/pipeline/quality-gate.sh --strict
        continue-on-error: false
