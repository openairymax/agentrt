name: ACC-C MemoryRovol PRO Full Feature

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/atoms/memoryrovol/**'
      - '.github/workflows/test-memoryrovol-pro.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/atoms/memoryrovol/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-headers:
    name: MemoryRovol Header + CMake Validation
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PRO Headers Present
        working-directory: agentos/atoms/memoryrovol/include
        run: |
          echo "=== ACC-C: Verifying L3/L4/Forgetting headers ==="
          for hdr in layer3_structure.h layer4_pattern.h forgetting.h; do
            if [ -f "$hdr" ]; then
              echo "  [OK] $hdr"
            else
              echo "  [MISSING] $hdr"
              exit 1
            fi
          done

      - name: Validate CMake Integration Layer
        working-directory: agentos/atoms/memoryrovol
        run: |
          echo "=== ACC-C: Validating CMake integration layer ==="
          grep -q 'MEMORYROVOL_SOURCE' CMakeLists.txt && echo "  [OK] MEMORYROVOL_SOURCE option found"
          grep -q 'MEMORYROVOL_PRO_LIB' CMakeLists.txt && echo "  [OK] MEMORYROVOL_PRO_LIB option found"
          grep -q 'MEMORYROVOL_PRO_MODE' CMakeLists.txt && echo "  [OK] MEMORYROVOL_PRO_MODE logic found"

      - name: Verify No Stub Functions in Headers
        working-directory: agentos/atoms/memoryrovol/include
        run: |
          echo "=== ACC-C: Scanning for stub/ENOSYS/ENOTSUP ==="
          grep -rn 'return\s*-\s*AGENTOS_ENOSYS\|return\s*-\s*AGENTOS_ENOTSUP' . 2>/dev/null || echo "  [OK] No ENOSYS/ENOTSUP"
          grep -rIn -i 'mock\|fake\|placeholder\|dummy\|stub.*return' . 2>/dev/null | grep -v '\.md\|Doxyfile' || echo "  [OK] No fake data markers"

  pro-build-test:
    name: PRO Mode Build (if MemoryRovol repo available)
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential libssl-dev libcurl4-openssl-dev libcjson-dev uuid-dev

      - name: Check MemoryRovol Independent Repo
        id: check-mr-repo
        run: |
          if [ -d "${{ github.workspace }}/MemoryRovol" ] && [ -f "${{ github.workspace }}/MemoryRovol/CMakeLists.txt" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "MemoryRovol independent repo found"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "MemoryRovol independent repo not available - skipping PRO build test"
          fi

      - name: Configure PRO Mode — BAN-33 compliant
        if: steps.check-mr-repo.outputs.available == 'true'
        run: |
          cmake -B ../MemoryRovol-build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DMEMORYROVOL_SOURCE=ON \
            -DMEMORYROVOL_DIR=${{ github.workspace }}/MemoryRovol \
            -DBUILD_TESTS=ON

      - name: Build
        if: steps.check-mr-repo.outputs.available == 'true'
        run: cmake --build ../MemoryRovol-build --parallel $(nproc)

      - name: Verify Symbols (L3/L4/Forgetting)
        if: steps.check-mr-repo.outputs.available == 'true'
        run: |
          echo "=== ACC-C: Verifying L3/L4/Forgetting symbols ==="
          for lib in ../MemoryRovol-build/libmemoryrovol*.a ../MemoryRovol-build/libmemoryrovol*.so; do
            if [ -f "$lib" ]; then
              echo "Checking: $lib"
              for sym in layer3_create layer3_destroy structure_query structure_update \
                         pattern_match pattern_analyze pattern_validate \
                         forgetting_apply forgetting_schedule forgetting_restore; do
                if nm "$lib" 2>/dev/null | grep -q "T $sym"; then
                  echo "  [OK] $sym"
                elif nm "$lib" 2>/dev/null | grep -q "t $sym"; then
                  echo "  [OK] $sym (local)"
                else
                  echo "  [MISSING] $sym"
                fi
              done
            fi
          done

      - name: Run Tests
        if: steps.check-mr-repo.outputs.available == 'true'
        run: cd ../MemoryRovol-build && ctest --output-on-failure -j $(nproc)

      - name: ACC-C Final Status
        if: always()
        run: |
          if [ "${{ steps.check-mr-repo.outputs.available }}" = "false" ]; then
            echo "ACC-C: SKIP - MemoryRovol independent repo not available"
            echo "ACC-C: Header validation passed (see validate-headers job)"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "ACC-C: PASS - MR PRO builds, L3/L4/Forgetting symbols present, tests pass"
          else
            echo "ACC-C: FAIL - See logs above"
            exit 1
          fi

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
