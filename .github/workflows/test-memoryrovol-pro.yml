# ═══════════════════════════════════════════════════════════════════════
# 终局验收标准 ACC-C: MemoryRovol PRO模式链接后全功能
# 验证方式: cmake -DMEMORYROVOL_BUILD_MODE=PRO + compile + link + ctest
# 对应 BAN:  BAN-33 (外置构建) + BAN-39 (功能门控)
# 负责人:   团队C
# ═══════════════════════════════════════════════════════════════════════
name: ACC-C MemoryRovol PRO Full Feature

on:
  push:
    branches: [main, develop]
    paths:
      - 'MemoryRovol/**'
      - '.github/workflows/test-memoryrovol-pro.yml'
  pull_request:
    branches: [main]
    paths:
      - 'MemoryRovol/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pro:
    name: PRO Mode Build (${{ matrix.build_type }})
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential libssl-dev libcurl4-openssl-dev libcmocka-dev

      - name: Configure PRO Mode — BAN-33 compliant
        working-directory: MemoryRovol
        run: |
          cmake -B ../MemoryRovol-build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DMEMORYROVOL_BUILD_MODE=PRO \
            -DBUILD_TESTING=ON \
            -Werror=dev

      - name: Build
        working-directory: MemoryRovol
        run: cmake --build ../MemoryRovol-build --parallel $(nproc)

      - name: Verify Symbols (L3/L4/Forgetting)
        working-directory: MemoryRovol
        run: |
          echo "=== ACC-C: Verifying L3/L4/Forgetting symbols ==="
          for lib in ../MemoryRovol-build/libmemoryrovol*.a ../MemoryRovol-build/libmemoryrovol*.so; do
            if [ -f "$lib" ]; then
              echo "Checking: $lib"
              for sym in layer3_create layer3_destroy structure_query structure_update \
                         pattern_match pattern_analyze pattern_validate \
                         forgetting_apply forgetting_schedule forgetting_restore; do
                if nm "$lib" 2>/dev/null | grep -q "T $sym"; then
                  echo "  [OK] $sym"
                elif nm "$lib" 2>/dev/null | grep -q "t $sym"; then
                  echo "  [OK] $sym (local)"
                else
                  echo "  [MISSING] $sym"
                fi
              done
            fi
          done

      - name: Verify No Stub Functions
        working-directory: MemoryRovol
        run: |
          echo "=== ACC-C: Scanning for stub/ENOSYS/ENOTSUP ==="
          grep -rn 'return\s*-\s*AGENTOS_ENOSYS\|return\s*-\s*AGENTOS_ENOTSUP' src/ 2>/dev/null || echo "  [OK] No ENOSYS/ENOTSUP"
          grep -rIn -i 'mock\|fake\|placeholder\|dummy\|stub.*return' src/ 2>/dev/null | grep -v 'test_\|\.md\|Doxyfile' || echo "  [OK] No fake data markers"

      - name: Run Tests
        working-directory: MemoryRovol
        run: cd ../MemoryRovol-build && ctest --output-on-failure -j $(nproc)

      - name: ACC-C Final Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "ACC-C: PASS - MR PRO builds, L3/L4/Forgetting symbols present, tests pass (${{ matrix.build_type }})"
          else
            echo "ACC-C: FAIL - See logs above"
            exit 1
          fi
