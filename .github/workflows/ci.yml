name: AgentOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: agentos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libmicrohttpd-dev libwebsockets-dev \
            libcjson-dev libyaml-dev libsqlite3-dev

      - name: Configure
        run: |
          cmake -B ${{ github.workspace }}/../AgentOS-ci-build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DWARNINGS_AS_ERRORS=OFF

      - name: Build
        run: |
          cmake --build ${{ github.workspace }}/../AgentOS-ci-build \
            --parallel $(nproc)

      - name: Test
        working-directory: ${{ github.workspace }}/../AgentOS-ci-build
        run: |
          ctest --output-on-failure -j $(nproc) --timeout 120

  ban-scan:
    name: BAN Compliance Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: BAN-33 — Out-of-source build check
        run: |
          if grep -rn "CMAKE_SOURCE_DIR.*STREQUAL.*CMAKE_BINARY_DIR" CMakeLists.txt 2>/dev/null | grep -v "^#" > /dev/null; then
            echo "[OK] BAN-33 guard present"
          else
            echo "::warning::BAN-33: in-source build guard not found"
          fi

      - name: BAN-43 — Hardcoded secrets scan
        run: |
          FOUND=0
          if grep -rn 'SECRET\|PASSWORD\|TOKEN.*=' agentos/ \
            --include='*.c' --include='*.h' 2>/dev/null | \
            grep -v "secrets\." | grep -v "CHANGE_ME" | grep -v "__GENERATE" | grep -v "fallback" | head -20; then
            echo "::warning::BAN-43: Potential hardcoded secrets found (review above)"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "[OK] BAN-43: No obvious hardcoded secrets"
          fi

      - name: BAN-57 — CORS wildcard scan
        run: |
          if grep -rn "Access-Control-Allow-Origin.*\\*" agentos/ \
            --include='*.c' --include='*.h' --include='*.conf' 2>/dev/null; then
            echo "::error::BAN-57: CORS wildcard found"
            exit 1
          else
            echo "[OK] BAN-57: No CORS wildcard"
          fi

      - name: BAN-60 — Fake implementations scan
        run: |
          echo "=== BAN-60: Stub / not-implemented markers ==="
          grep -rn "ENOSYS\|ENOTSUP\|NOT_IMPLEMENTED\|stub\|TODO.*implement" agentos/ \
            --include='*.c' --include='*.h' 2>/dev/null | grep -v test_ | grep -v Docs | head -20 || \
            echo "[OK] No stub markers found"

      - name: BAN-64 — CMake add_compile_definitions -D check
        run: |
          if grep -rn 'add_compile_definitions.*-D' --include='CMakeLists.txt' . 2>/dev/null; then
            echo "::error::BAN-64: -D prefix found in add_compile_definitions"
            exit 1
          else
            echo "[OK] BAN-64: No redundant -D prefix"
          fi

      - name: BAN-58 — Hardcoded absolute paths
        run: |
          if grep -rn '/var/run/agentos\|/home/spharx' agentos/ \
            --include='*.c' --include='*.h' 2>/dev/null | grep -v test_ | grep -v Docs | head -10; then
            echo "::warning::BAN-58: Hardcoded absolute paths found"
          else
            echo "[OK] BAN-58: No hardcoded paths in source"
          fi

  result:
    name: CI Result
    needs: [build-and-test, ban-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build-and-test status
        if: ${{ needs.build-and-test.result == 'failure' }}
        run: exit 1
      - name: Check ban-scan status
        if: ${{ needs.ban-scan.result == 'failure' }}
        run: exit 1
      - name: All checks passed
        run: echo "::notice::All AgentOS CI checks passed!"
