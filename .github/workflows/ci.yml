# AgentOS CI Pipeline v4.0
# align: 工程规范化标准手册 v11.14, BAN-01~36
# v4.0: 合并protocol-ci.yml, 统一构建目录(../AgentOS-build), BAN-33合规
# trigger: push(main/develop) + PR(main) + manual

name: CI Pipeline v4.0

on:
  push:
    branches: [main, develop]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md']
  workflow_dispatch:

env:
  BUILD_DIR: ${{ github.workspace }}/../AgentOS-build

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Build - Release + Debug
  # ============================================================
  build:
    name: Build (${{ matrix.config.type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - {type: Release, cache: rel}
          - {type: Debug, cache: dbg}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: agentos-ccache-${{ matrix.config.cache }}-${{ hashFiles('**/*.c', '**/*.h', '**/CMakeLists.txt') }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake gcc g++ ccache \
            libcurl4-openssl-dev libcjson-dev libssl-dev \
            libmicrohttpd-dev libwebsockets-dev libcmocka-dev \
            libsqlite3-dev libyaml-dev valgrind cppcheck clang-format 2>/dev/null || true
          if ! dpkg -l libcjson-dev &>/dev/null; then
            git clone --depth 1 https://github.com/DaveGamble/cJSON.git /tmp/cjson
            cmake -S /tmp/cjson -B /tmp/cjson/build -DBUILD_SHARED_LIBS=ON -DENABLE_CJSON_UTILS=OFF
            sudo cmake --build /tmp/cjson/build --target install
            sudo ldconfig
          fi
          ccache --set-config=max_size=500M 2>/dev/null || true

      - name: Configure CMake
        run: |
          rm -rf ${{ env.BUILD_DIR }}
          cmake -S . -B ${{ env.BUILD_DIR }} \
            -DCMAKE_BUILD_TYPE=${{ matrix.config.type }} \
            -DBUILD_TESTS=ON -DBUILD_DAEMON=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        id: build_step
        run: |
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc) 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Check build result
        if: always()
        run: |
          if [ "${{ steps.build_step.outputs.exit_code }}" != "0" ]; then
            echo "::error::Build failed for ${{ matrix.config.type }}"
            exit 1
          fi
          echo "✅ Build ${{ matrix.config.type }} succeeded"
          find ${{ env.BUILD_DIR }} -name "*.a" -o -name "*.so" -type f 2>/dev/null | head -5

  # ============================================================
  # Job 2: Test + BAN Audit + Quality Gate
  # ============================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install test deps
        run: |
          sudo apt-get install -y -qq libcmocka-dev valgrind cppcheck clang-format 2>/dev/null || true

      - name: Build with tests
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} \
            -DBUILD_DAEMON=ON -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc)

      - name: Run CTest
        id: ctest_run
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ctest --output-on-failure --timeout 120 -j$(nproc) 2>&1 | tee ctest.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Assert tests pass
        run: |
          if [ "${{ steps.ctest_run.outputs.exit_code }}" != "0" ]; then
            echo "::error::CTest failures detected"
            exit 1
          fi
          echo "✅ All CTest passed"

      - name: BAN Audit (BAN-01~36)
        run: |
          if [ -f "scripts/pipeline/quality-gate.sh" ]; then
            bash scripts/pipeline/quality-gate.sh --strict
          else
            echo "quality-gate.sh not found, running inline checks"
            echo "=== BAN-17 simplified implementation check ==="
            hits=$(grep -rn "简化实现\|简化版\|simplified" --include="*.c" --include="*.h" agentos/ 2>/dev/null | grep -v test_ | grep -v tests/ | wc -l)
            echo "BAN-17: $hits"; [ "$hits" -eq 0 ] || echo "::warning::BAN-17 violations: $hits"
            echo "=== BAN-33 in-source build check ==="
            [ ! -d "build" ] || echo "::warning::BAN-33 violation: build/ dir in source"
            echo "=== BAN-34 clang-format check ==="
            if command -v clang-format &>/dev/null; then
              find agentos -name "*.c" -o -name "*.h" | head -50 | xargs clang-format --dry-run --Werror 2>/dev/null || echo "::warning::BAN-34 formatting issues"
            fi
          fi

  # ============================================================
  # Job 3: Protocol Compatibility (gateway/protocol only)
  # ============================================================
  protocol:
    name: Protocol Compatibility
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && contains(join(github.event.commits.*.modified, ' '), 'gateway/')) ||
      (github.event_name == 'push' && contains(join(github.event.commits.*.modified, ' '), 'protocols/'))

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            build-essential cmake gcc g++ libcurl4-openssl-dev libcjson-dev \
            libmicrohttpd-dev libssl-dev 2>/dev/null || true

      - name: Build Gateway
        run: |
          cmake -S . -B ${{ env.BUILD_DIR }} -DBUILD_DAEMON=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc)

      - name: Verify gateway binary
        run: |
          binary=$(find ${{ env.BUILD_DIR }} -name "*gateway*" -type f 2>/dev/null | head -1)
          if [ -n "$binary" ]; then
            echo "✅ Gateway built: $binary"
            file "$binary"
          else
            echo "::warning::Gateway binary not found"
          fi

  # ============================================================
  # Job 4: Status Summary
  # ============================================================
  status:
    name: Status Report
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    steps:
      - run: |
          cat << 'REPORT' >> $GITHUB_STEP_SUMMARY
          # CI Pipeline v4.0 — Status

          | Job | Status |
          |-----|--------|
          | Build (Release) | ${{ needs.build.result == 'success' && '✅' || '❌' }} |
          | Build (Debug) | ${{ needs.build.result == 'success' && '✅' || '❌' }} |
          | Test Suite | ${{ needs.test.result == 'success' && '✅' || '❌' }} |

          *Generated by AgentOS CI v4.0*
          REPORT
