# =============================================================================
# ci.yml — AgentRT Unified CI Pipeline
# 合并自: ci.yml + sanitizer-ci.yml + memoryrovol-integration.yml
# 触发: push to main/develop + PR to main + schedule(weekly Valgrind)
# =============================================================================
name: AgentRT CI

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每周日 02:00 UTC 运行完整 Valgrind 检查 (SEC-06)
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  group: agentrt-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Debug

# =============================================================================
# 公共依赖安装步骤（通过 reusable workflow 减少重复）
# =============================================================================
jobs:
  # ===========================================================================
  # Job 1: 基础构建 & 单元测试
  # ===========================================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential ninja-build \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libmicrohttpd-dev libwebsockets-dev \
            libcjson-dev libyaml-dev libsqlite3-dev libevent-dev
      - name: Configure
        run: |
          cmake -B build-ci \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DAGENTRT_COMPLIANCE_STRICT=OFF \
            -DWARNINGS_AS_ERRORS=OFF \
            -G Ninja
      - name: Build
        run: cmake --build build-ci --parallel $(nproc)
      - name: Test
        working-directory: build-ci
        run: ctest --output-on-failure -j $(nproc) --timeout 120

  # ===========================================================================
  # Job 2: BAN 规则合规扫描
  # ===========================================================================
  ban-scan:
    name: BAN Compliance Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: BAN-33 — Out-of-source build guard
        run: |
          if grep -rn "CMAKE_SOURCE_DIR.*STREQUAL.*CMAKE_BINARY_DIR" CMakeLists.txt 2>/dev/null | grep -v "^#" > /dev/null; then
            echo "[OK] BAN-33 guard present"
          else
            echo "::warning::BAN-33: in-source build guard not found"
          fi
      - name: BAN-43 — Hardcoded secrets scan
        run: |
          FOUND=0
          if grep -rn 'SECRET\|PASSWORD\|TOKEN.*=' agentrt/ \
            --include='*.c' --include='*.h' 2>/dev/null | \
            grep -v "secrets\." | grep -v "CHANGE_ME" | grep -v "__GENERATE" | grep -v "fallback" | head -20; then
            echo "::warning::BAN-43: Potential hardcoded secrets found (review above)"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "[OK] BAN-43: No obvious hardcoded secrets"
          fi
      - name: BAN-57 — CORS wildcard scan
        run: |
          if grep -rn "Access-Control-Allow-Origin.*\\*" agentrt/ \
            --include='*.c' --include='*.h' --include='*.conf' 2>/dev/null; then
            echo "::error::BAN-57: CORS wildcard found"
            exit 1
          else
            echo "[OK] BAN-57: No CORS wildcard"
          fi
      - name: BAN-58 — Hardcoded absolute paths
        run: |
          if grep -rn '/var/run/agentrt\|/home/spharx' agentrt/ \
            --include='*.c' --include='*.h' 2>/dev/null | grep -v test_ | grep -v Docs | head -10; then
            echo "::warning::BAN-58: Hardcoded absolute paths found"
          else
            echo "[OK] BAN-58: No hardcoded paths in source"
          fi
      - name: BAN-60 — Stub / not-implemented markers
        run: |
          echo "=== BAN-60: Stub / not-implemented markers ==="
          grep -rn "ENOSYS\|ENOTSUP\|NOT_IMPLEMENTED\|stub\|TODO.*implement" agentrt/ \
            --include='*.c' --include='*.h' 2>/dev/null | grep -v test_ | grep -v Docs | head -20 || \
            echo "[OK] No stub markers found"
      - name: BAN-64 — CMake add_compile_definitions -D check
        run: |
          if grep -rn 'add_compile_definitions.*-D' --include='CMakeLists.txt' . 2>/dev/null; then
            echo "::error::BAN-64: -D prefix found in add_compile_definitions"
            exit 1
          else
            echo "[OK] BAN-64: No redundant -D prefix"
          fi
      - name: BAN-70/71/72 — CMake options verification
        run: |
          grep -rn 'option(BUILD_TESTS.*ON' CMakeLists.txt 2>/dev/null && echo "[OK] BAN-70" || echo "::warning::BAN-70"
          grep -rn 'banned_functions\.h' CMakeLists.txt 2>/dev/null && echo "[OK] BAN-71" || echo "::warning::BAN-71"
          grep -rn 'option(WARNINGS_AS_ERRORS' CMakeLists.txt 2>/dev/null && echo "[OK] BAN-72" || echo "::warning::BAN-72"
      - name: BAN-77 — No GBK-encoded source files
        run: |
          if find agentrt/ -name '*.c' -o -name '*.h' | xargs file -i 2>/dev/null | grep -i 'charset=iso-8859\|charset=gb\|charset=unknown-8bit' | head -10; then
            echo "::error::BAN-77: Non-UTF-8 encoded source files found"
            exit 1
          else
            echo "[OK] BAN-77: All source files are UTF-8 encoded"
          fi

  # ===========================================================================
  # Job 3: Clang-Tidy 增量静态分析
  # ===========================================================================
  clang-tidy:
    name: Clang-Tidy Analysis
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-tidy cmake build-essential ninja-build \
            libssl-dev libcurl4-openssl-dev libcjson-dev libyaml-dev
      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
          else
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -n "$BASE_SHA" ]; then
            CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD -- '*.c' '*.h' 2>/dev/null | head -50 || echo "")
          else
            CHANGED=""
          fi
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Configure CMake
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -G Ninja
      - name: Run clang-tidy
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.changed-files.outputs.files }}" | while read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              echo "::group::clang-tidy: $file"
              clang-tidy "$file" -p build --header-filter='.*' 2>&1 || echo "::warning::clang-tidy reported issues in $file"
              echo "::endgroup::"
            fi
          done

  # ===========================================================================
  # Job 4: Cppcheck 静态分析
  # ===========================================================================
  cppcheck:
    name: Cppcheck Static Analysis
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c11 --error-exitcode=0 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -i build -i third_party -i vendor \
            agentrt/ 2>&1 | tee cppcheck-report.txt
          ISSUES=$(grep -c '^\[' cppcheck-report.txt 2>/dev/null || echo "0")
          echo "::notice::cppcheck: $ISSUES issues found"
          if [ "$ISSUES" -gt 0 ]; then
            cat cppcheck-report.txt
          fi

  # ===========================================================================
  # Job 5: Sanitizer 测试 (ASan + LSan + UBSan)
  # 合并自: ci.yml sanitizer-test + sanitizer-ci.yml asan-lsan-build/ubsan-build
  # ===========================================================================
  sanitizer-test:
    name: Sanitizer Test (ASan+LSan+UBSan)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential ninja-build \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libmicrohttpd-dev libwebsockets-dev \
            libcjson-dev libyaml-dev libsqlite3-dev
      - name: Configure with Sanitizers
        run: |
          cmake -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DWARNINGS_AS_ERRORS=ON \
            -DENABLE_SANITIZERS=ON \
            -DAGENTRT_COMPLIANCE_STRICT=OFF \
            -G Ninja
      - name: Build with Sanitizers
        run: cmake --build build-asan --parallel $(nproc)
      - name: Test with ASan+LSan+UBSan
        working-directory: build-asan
        env:
          ASAN_OPTIONS: "halt_on_error=1:detect_stack_use_after_return=1:detect_leaks=1:allocator_may_return_null=1"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/ecosystem/manager/sanitizer/lsan-suppressions:print_suppressions=0"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1:report_error_type=1"
        run: |
          ctest --output-on-failure -j $(nproc) --timeout 300
      - name: Upload ASan artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-report-${{ github.run_id }}
          path: build-asan/
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # Job 6: MemoryRovol OSS 模式构建 & 测试
  # ===========================================================================
  memoryrovol-oss:
    name: MemoryRovol OSS Mode
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential ninja-build \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libyaml-dev libcjson-dev libsqlite3-dev
      - name: Configure OSS Mode
        run: |
          cmake -S . -B build-oss \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMEMORYROVOL_OSS=ON \
            -DBUILD_TESTS=ON \
            -G Ninja
      - name: Build
        run: cmake --build build-oss --parallel $(nproc)
      - name: Test
        working-directory: build-oss
        run: ctest --output-on-failure -j $(nproc) --timeout 60
      - name: Verify OSS Symbol Stripping
        run: |
          echo "=== Verify L3/L4/Forgetting symbols NOT present in OSS mode ==="
          for lib in build-oss/libmemoryrovol*.a \
                     build-oss/agentrt/atoms/memoryrovol/*.a; do
            if [ -f "$lib" ]; then
              echo "Checking: $lib"
              for sym in layer3_create structure_query pattern_match forgetting_apply; do
                if nm "$lib" 2>/dev/null | grep -q "T $sym"; then
                  echo "::error::OSS mode contains PRO symbol: $sym"
                  exit 1
                fi
              done
              echo "  [OK] No PRO symbols in OSS build"
            fi
          done

  # ===========================================================================
  # Job 7: MemoryRovol PRO 模式构建 & 符号验证
  # ===========================================================================
  memoryrovol-pro:
    name: MemoryRovol PRO Mode
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential ninja-build \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libyaml-dev libcjson-dev libsqlite3-dev
      - name: Configure PRO Mode
        run: |
          cmake -S . -B build-pro \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=ON \
            -DAGENTRT_COMPLIANCE_STRICT=OFF \
            -G Ninja
      - name: Build
        run: cmake --build build-pro --parallel $(nproc)
      - name: Test
        working-directory: build-pro
        run: ctest --output-on-failure -j $(nproc) --timeout 60
      - name: Verify PRO Symbols
        run: |
          echo "=== ACC-C: Verify L3/L4/Forgetting symbols in PRO mode ==="
          FOUND=0
          for lib in build-pro/libmemoryrovol*.a \
                     build-pro/agentrt/atoms/memoryrovol/*.a; do
            if [ -f "$lib" ]; then
              echo "Checking: $lib"
              for sym in layer3_create layer3_destroy structure_query structure_update \
                         pattern_match pattern_analyze pattern_validate \
                         forgetting_apply forgetting_schedule forgetting_restore; do
                if nm "$lib" 2>/dev/null | grep -q "T $sym"; then
                  echo "  [OK] $sym"
                  FOUND=$((FOUND + 1))
                else
                  echo "  [MISSING] $sym"
                fi
              done
            fi
          done
          echo "PRO symbols found: $FOUND/10"

  # ===========================================================================
  # Job 8: 合约版本检查
  # ===========================================================================
  contract-check:
    name: Contract Version Check
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check contract version changes
        run: |
          if [ -f scripts/ci/pipeline/validate/contract-version-check.sh ]; then
            bash scripts/ci/pipeline/validate/contract-version-check.sh --ci --baseline-branch "${{ github.event.pull_request.base.ref || 'main' }}"
          else
            echo "[SKIP] contract-version-check.sh not found"
          fi
      - name: Upload contract version snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-versions
          path: ci-artifacts/contract-versions.txt
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Job 9: 连接线集成测试 (12 Lines + Hook)
  # ===========================================================================
  connection-tests:
    name: Connection Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build daemon images
        run: |
          if [ -f deploy/docker/docker-compose.test.yml ]; then
            docker compose -f deploy/docker/docker-compose.test.yml build --parallel 2>&1 | tail -20
          else
            echo "[SKIP] docker-compose.test.yml not found"
          fi
      - name: Run connection tests (HTTP)
        run: |
          if [ -f scripts/ci/pipeline/test/run-connection-tests.sh ]; then
            chmod +x scripts/ci/pipeline/test/run-connection-tests.sh
            bash scripts/ci/pipeline/test/run-connection-tests.sh --all --ci
          else
            echo "[SKIP] run-connection-tests.sh not found"
          fi
      - name: Compile and run C integration tests (stub mode)
        if: always()
        run: |
          if [ -d tests/integration/c ]; then
            echo "=== Compiling C integration tests (stub mode) ==="
            cd tests/integration/c
            for test_file in test_c_link_*.c test_hook_system.c; do
              if [ -f "$test_file" ]; then
                test_name="${test_file%.c}"
                echo "  Compiling ${test_name}..."
                gcc -std=c11 -Wall -Wextra -g \
                  -Wno-unused-function -Wno-unused-variable -Wno-unused-parameter \
                  -I ../../../agentrt/atoms/coreloopthree/include \
                  -I ../../../agentrt/daemons/llm_d/include \
                  -I ../../../agentrt/daemons/tool_d/include \
                  -I ../../../agentrt/daemons/common/include \
                  -I ../../../agentrt/daemons/monit_d/include \
                  -I ../../../agentrt/daemons/gateway_d/include \
                  -I ../../../agentrt/daemons/hook_d/include \
                  -I ../../../agentrt/commons/utils/memory/include \
                  -I ../../../agentrt/commons/utils/error/include \
                  -I ../../../agentrt/commons/platform/include \
                  -I ../../../agentrt/cupolas/include \
                  -I . \
                  -o "${test_name}" \
                  "${test_file}" test_stubs.c \
                  -lpthread -lm 2>&1 && \
                echo "  Running ${test_name}..." && \
                "./${test_name}" && echo "  ${test_name}: PASS" || echo "  ${test_name}: FAIL"
              fi
            done
          else
            echo "[SKIP] tests/integration/c/ not found"
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connection-test-results
          path: ci-artifacts/tests/connection-tests.xml
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Job 10: 质量门禁
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format shellcheck python3
      - name: Run quality-gate.sh
        run: |
          if [ -f scripts/ci/pipeline/validate/quality-gate.sh ]; then
            bash scripts/ci/pipeline/validate/quality-gate.sh --strict
          else
            echo "[SKIP] quality-gate.sh not found"
          fi
      - name: Run forbidden_functions.sh (BAN-151~BAN-180)
        run: |
          if [ -f scripts/ci/verify/forbidden_functions.sh ]; then
            chmod +x scripts/ci/verify/forbidden_functions.sh
            bash scripts/ci/verify/forbidden_functions.sh .
          else
            echo "[SKIP] forbidden_functions.sh not found"
          fi
      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: ci-artifacts/quality-report.json
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # Job 11: Python 代码检查
  # ===========================================================================
  python-checks:
    name: Python Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python lint tools
        run: |
          pip install flake8 bandit mypy 2>/dev/null || echo "::warning::some Python lint tools not available"
      - name: BAN-80 — flake8 (no shadow builtins)
        run: |
          flake8 --select=A001,A002,A003 --max-line-length=120 \
            --exclude=venv,.venv,build,node_modules,__pycache__ . 2>&1 || \
            echo "::warning::BAN-80: flake8 shadow builtins check found issues"
      - name: BAN-81 — flake8 f-string syntax
        run: |
          flake8 --select=F541 --max-line-length=120 \
            --exclude=venv,.venv,build,node_modules,__pycache__ . 2>&1 || \
            echo "::warning::BAN-81: flake8 f-string check found issues"
      - name: BAN-82 — bandit security scan
        run: |
          bandit -r . -x venv,.venv,build,node_modules,__pycache__ -ll 2>&1 || \
            echo "::warning::BAN-82: bandit security scan found issues"

  # ===========================================================================
  # Job 12: Valgrind Memcheck (仅定时/手动触发) — SEC-06
  # ===========================================================================
  valgrind-memcheck:
    name: Valgrind Memcheck
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential ninja-build valgrind \
            libssl-dev libcurl4-openssl-dev libcmocka-dev \
            libyaml-dev libcjson-dev libsqlite3-dev
      - name: Configure for Valgrind (no sanitizers)
        run: |
          cmake -B build-valgrind \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_SANITIZERS=OFF \
            -DBUILD_TESTS=ON \
            -DAGENTRT_COMPLIANCE_STRICT=OFF \
            -G Ninja
      - name: Build
        run: cmake --build build-valgrind --parallel $(nproc)
      - name: Run Valgrind memcheck
        run: |
          ctest --test-dir build-valgrind --output-on-failure -j $(nproc) --timeout 300 \
            --valgrind --valgrind-track-origins=yes
      - name: Upload Valgrind artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report-${{ github.run_id }}
          path: build-valgrind/valgrind-*.log
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Job 13: CI 结果汇总
  # ===========================================================================
  result:
    name: CI Result
    needs: [build-and-test, ban-scan, clang-tidy, cppcheck, sanitizer-test, memoryrovol-oss, memoryrovol-pro, contract-check, connection-tests, quality-gate, python-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all job statuses
        run: |
          FAILED=0
          for job in build-and-test ban-scan clang-tidy cppcheck sanitizer-test memoryrovol-oss memoryrovol-pro contract-check connection-tests quality-gate python-checks; do
            case "$job" in
              build-and-test)    STATUS="${{ needs.build-and-test.result }}" ;;
              ban-scan)          STATUS="${{ needs.ban-scan.result }}" ;;
              clang-tidy)        STATUS="${{ needs.clang-tidy.result }}" ;;
              cppcheck)          STATUS="${{ needs.cppcheck.result }}" ;;
              sanitizer-test)    STATUS="${{ needs.sanitizer-test.result }}" ;;
              memoryrovol-oss)   STATUS="${{ needs.memoryrovol-oss.result }}" ;;
              memoryrovol-pro)   STATUS="${{ needs.memoryrovol-pro.result }}" ;;
              contract-check)    STATUS="${{ needs.contract-check.result }}" ;;
              connection-tests)  STATUS="${{ needs.connection-tests.result }}" ;;
              quality-gate)      STATUS="${{ needs.quality-gate.result }}" ;;
              python-checks)     STATUS="${{ needs.python-checks.result }}" ;;
              *)                 STATUS="skipped" ;;
            esac
            echo "  $job: $STATUS"
            if [ "$STATUS" = "failure" ]; then
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi
          echo "::notice::All AgentRT CI checks passed!"
