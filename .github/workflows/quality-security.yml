name: Quality & Security v4.1

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Security scan mode
        default: standard
        options: [standard, comprehensive]

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

concurrency:
  group: quality-security
  cancel-in-progress: false

jobs:
  audit:
    name: Security & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install security tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cppcheck cloc jq python3 2>/dev/null || true

      - name: Custom security check
        id: security
        run: |
          if [ -f "scripts/pipeline/security_check.py" ]; then
            python3 scripts/pipeline/security_check.py agentos/ 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "::error::Security check found CRITICAL issues (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          else
            echo "=== Basic security check ==="
            unsafe=$(grep -rn "strcpy\|strcat\|sprintf\|gets" --include="*.c" agentos/ 2>/dev/null | grep -v test_ | wc -l)
            echo "Unsafe function calls: $unsafe"
            if [ "$unsafe" -gt 0 ]; then
              echo "::warning::$unsafe unsafe function calls found (strcpy/strcat/sprintf/gets)"
            fi
            secrets=$(grep -rn "sk-[A-Za-z0-9]\{20,\}\|AKIA[A-Z0-9]\{16,\}\|ghp_[A-Za-z0-9]\{36,\}\|glpat-[A-Za-z0-9\-]\{20,\}" --include="*.c" --include="*.h" --include="*.py" --include="*.sh" agentos/ 2>/dev/null | grep -v test_ | wc -l)
            echo "Potential secrets: $secrets"
            if [ "$secrets" -gt 0 ]; then
              echo "::error::$secrets potential secrets detected in source code"
              exit 1
            fi
          fi

      - name: Cppcheck static analysis
        continue-on-error: true
        run: |
          if command -v cppcheck &>/dev/null; then
            cppcheck --enable=warning,performance,portability --suppress=missingInclude \
              --error-exitcode=0 --inline-suppr \
              agentos/ 2>&1 | tail -50
          fi

      - name: BAN compliance check
        run: |
          echo "=== BAN-17: Simplified implementation check ==="
          hits=$(grep -rn "简化实现\|简化版\|simplified implementation" --include="*.c" --include="*.h" agentos/ 2>/dev/null | grep -v test_ | grep -v tests/ | wc -l)
          echo "BAN-17 violations: $hits"
          if [ "$hits" -gt 0 ]; then echo "::error::BAN-17: $hits simplified implementations found"; exit 1; fi

          echo "=== BAN-18: Stub function check ==="
          stubs=$(grep -rn "return AGENTOS_SUCCESS;" --include="*.c" agentos/ 2>/dev/null | grep -v test_ | grep -v "if " | head -20 | wc -l)
          echo "BAN-18 potential stubs: $stubs (manual review needed)"

          echo "=== BAN-33: In-source build directory check ==="
          if [ -d "agentos/build" ] || [ -d "agentos/build-test" ] || [ -d "build" ]; then
            echo "::error::BAN-33: Build directory found in source tree"
            exit 1
          fi
          echo "BAN-33: Clean"

          echo "=== BAN-26: Environment variable bypass check ==="
          bypass=$(grep -rn "getenv.*DEV\|getenv.*BYPASS\|getenv.*SKIP" --include="*.c" agentos/ 2>/dev/null | grep -v test_ | wc -l)
          echo "BAN-26 potential bypasses: $bypass"
          if [ "$bypass" -gt 0 ]; then echo "::warning::BAN-26: $bypass potential env var bypasses found"; fi

      - name: Code statistics
        run: |
          if command -v cloc &>/dev/null; then
            cloc agentos/ --quiet --json 2>/dev/null | python3 -c "
import sys,json
try:
    d = json.load(sys.stdin)
    print(f\"C: {d.get('C',{}).get('code',0)} lines\")
    print(f\"C/C++ Header: {d.get('C/C++ Header',{}).get('code',0)} lines\")
    print(f\"Python: {d.get('Python',{}).get('code',0)} lines\")
    print(f\"Total: {d.get('SUM',{}).get('code',0)} lines\")
except: print('cloc unavailable')" 2>/dev/null || true
          fi

      - name: Technical debt
        run: |
          todos=$(grep -rn "TODO\|FIXME" --include="*.c" --include="*.h" agentos/ 2>/dev/null | grep -v "DONE" | wc -l)
          echo "TODO/FIXME count: $todos"
          if [ "$todos" -gt 50 ]; then echo "::warning::$todos TODO/FIXME items found"; fi

  stale:
    name: Stale Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 30 days. Will be closed in 7 days.'
          stale-pr-message: 'This PR has been inactive for 60 days. Will be closed in 14 days.'
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 60
          days-before-pr-close: 14
          exempt-issue-labels: pinned,security
          operations-per-run: 100
