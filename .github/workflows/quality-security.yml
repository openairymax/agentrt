# AgentOS Quality & Security v4.0
# v4.0: 合并原3个cron为1个, BAN-33合规
# trigger: scheduled(每日) + manual

name: Quality & Security v4.0

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Security scan mode
        default: standard
        options: [standard, comprehensive]

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

concurrency:
  group: quality-security
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 1: Security Audit + Quality Metrics (每日)
  # ============================================================
  audit:
    name: Security & Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Custom security check
        run: |
          if [ -f "scripts/pipeline/security_check.py" ]; then
            python3 scripts/pipeline/security_check.py agentos/ 2>&1 | head -30
          else
            echo "=== Basic security check ==="
            unsafe=$(grep -rn "strcpy\|strcat\|sprintf\|gets" --include="*.c" agentos/ 2>/dev/null | grep -v test_ | wc -l)
            echo "Unsafe function calls: $unsafe"
            secrets=$(grep -rn "sk-[A-Za-z0-9]\{20,\}\|AKIA[A-Z0-9]\{16,\}" --include="*.c" --include="*.h" --include="*.py" agentos/ 2>/dev/null | grep -v test_ | wc -l)
            echo "Potential secrets: $secrets"
          fi

      - name: Code statistics
        run: |
          sudo apt-get install -y -qq cloc jq 2>/dev/null || true
          if command -v cloc &>/dev/null; then
            cloc agentos/ --quiet --json 2>/dev/null | python3 -c "
import sys,json
try:
    d = json.load(sys.stdin)
    print(f\"C: {d.get('C',{}).get('code',0)} lines\")
    print(f\"C/C++ Header: {d.get('C/C++ Header',{}).get('code',0)} lines\")
    print(f\"Python: {d.get('Python',{}).get('code',0)} lines\")
    print(f\"Total: {d.get('SUM',{}).get('code',0)} lines\")
except: print('cloc unavailable')" 2>/dev/null || true
          fi

      - name: Technical debt
        run: |
          todos=$(grep -rn "TODO\|FIXME" --include="*.c" --include="*.h" agentos/ 2>/dev/null | grep -v "DONE" | wc -l)
          echo "TODO/FIXME count: $todos"
          if [ "$todos" -gt 50 ]; then echo "::warning::$todos TODO/FIXME items found"; fi

  # ============================================================
  # Job 2: Stale Management (每周)
  # ============================================================
  stale:
    name: Stale Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 30 days. Will be closed in 7 days.'
          stale-pr-message: 'This PR has been inactive for 60 days. Will be closed in 14 days.'
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 60
          days-before-pr-close: 14
          exempt-issue-labels: pinned,security
          operations-per-run: 100
