name: Quality Monitoring

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

concurrency:
  group: quality-monitoring
  cancel-in-progress: false

jobs:
  quality-trend-analysis:
    name: Quality Trend Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Setup analysis environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cloc jq 2>/dev/null || true

      - name: Code metrics analysis
        continue-on-error: true
        run: |
          echo "## Code Metrics Report" >> $GITHUB_STEP_SUMMARY

          if command -v cloc &> /dev/null; then
            cloc_output=$(cloc . --exclude-dir=build-*,node_modules,.git,AgentOS-build --quiet --json 2>/dev/null || echo "{}")
            echo "### Code Lines by Language" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Language | Files | Code | Comment | Blank |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|------|---------|-------|" >> $GITHUB_STEP_SUMMARY

            echo "$cloc_output" | jq -r '
              to_entries[] |
              select(.key != "header" and .key != "SUM") |
              "| \(.key) | \(.value.nFiles) | \(.value.code) | \(.value.comment) | \(.value.blank) |"
            ' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| (cloc parse error) | | | | |" >> $GITHUB_STEP_SUMMARY
          else
            echo "cloc not available, using fallback" >> $GITHUB_STEP_SUMMARY
            TOTAL_C=$(find agentos \( -name '*.c' -o -name '*.h' \) -type f 2>/dev/null | wc -l)
            echo "| C/H Files | ${TOTAL_C} | | | |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Technical debt analysis
        run: |
          echo "### Technical Debt Indicators" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          todo_count=$(grep -r "TODO" agentos --include="*.c" --include="*.h" --include="*.py" --include="*.rs" --include="*.go" --include="*.ts" --exclude-dir=build-* 2>/dev/null | wc -l)
          fixme_count=$(grep -r "FIXME" agentos --include="*.c" --include="*.h" --include="*.py" --include="*.rs" --include="*.go" --include="*.ts" --exclude-dir=build-* 2>/dev/null | wc -l)

          echo "| Indicator | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| TODO | $todo_count |" >> $GITHUB_STEP_SUMMARY
          echo "| FIXME | $fixme_count |" >> $GITHUB_STEP_SUMMARY

          total=$((todo_count + fixme_count))
          if [ $total -gt 50 ]; then
            echo "::warning::High technical debt detected ($total indicators)"
          fi

  historical-comparison:
    name: Historical Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Analyze commit history
        run: |
          echo "## Recent Commits (Last 30 Days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Date | Commit | Message |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          git log --since="30 days ago" --pretty=format:"|%ad|%h|%s|" --date=short | head -20 >> $GITHUB_STEP_SUMMARY
