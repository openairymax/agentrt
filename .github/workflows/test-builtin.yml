name: ACC-A AgentOS Pure OSS Buildable

on:
  push:
    branches: [main, develop]
    paths:
      - 'agentos/**'
      - '.github/workflows/test-builtin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agentos/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build + Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-13]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential libssl-dev libcurl4-openssl-dev libcmocka-dev uuid-dev libcjson-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake openssl curl cjson

      - name: Configure (CMake) — BAN-33 compliant out-of-source build
        run: |
          cmake -B ../AgentOS-build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build ../AgentOS-build --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Unit Tests
        run: cd ../AgentOS-build && ctest --output-on-failure -j $(nproc 2>/dev/null || echo 4)

      - name: ACC-A Final Status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "ACC-A: PASS - AgentOS pure OSS builds and tests pass (${{ matrix.os }}, ${{ matrix.build_type }})"
          else
            echo "ACC-A: FAIL - See logs above"
            exit 1
          fi
