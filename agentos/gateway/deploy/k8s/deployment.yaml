# Kubernetes Deployment for AgentOS gateway Module
# Version: 0.1.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentos-gateway
  namespace: agentos-gateway
  labels:
    app.kubernetes.io/name: agentos-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: agentos-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentos-gateway
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agentos-gateway
      
      # 安全上下文
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # 容器配置
      containers:
        - name: gateway
          image: ${GATEWAY_IMAGE:-ghcr.io/spharx/agentos-gateway}:latest
          imagePullPolicy: Always
          
          # 端口配置
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: websocket
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          # 环境变量
          env:
            - name: AGENTOS_MODULE
              value: "gateway"
            - name: AGENTOS_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: agentos-gateway-manager
                  key: log_level
            - name: AGENTOS_HTTP_PORT
              value: "8080"
            - name: AGENTOS_WS_PORT
              value: "8081"
            - name: AGENTOS_METRICS_PORT
              value: "9090"
            - name: AGENTOS_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: agentos-gateway-manager
                  key: redis_host
            - name: AGENTOS_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: agentos-gateway-manager
                  key: redis_port
            - name: AGENTOS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentos-gateway-secrets
                  key: jwt_secret
            - name: AGENTOS_ENABLE_AUTH
              valueFrom:
                configMapKeyRef:
                  name: agentos-gateway-manager
                  key: enable_auth
          
          # 资源限制
          resources:
            limits:
              cpu: "2"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "128Mi"
          
          # 健康检查
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          # 启动探针
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          # 卷挂载
          volumeMounts:
            - name: manager
              mountPath: /etc/agentos/gateway
              readOnly: true
            - name: logs
              mountPath: /var/log/agentos
      
      # 卷定义
      volumes:
        - name: manager
          configMap:
            name: agentos-gateway-manager
        - name: logs
          emptyDir: {}
      
      # 亲和性配置
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: agentos-gateway
                topologyKey: kubernetes.io/hostname
      
      # 容忍配置
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentos-gateway
  namespace: agentos-gateway
  labels:
    app.kubernetes.io/name: agentos-gateway

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentos-gateway-hpa
  namespace: agentos-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentos-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
