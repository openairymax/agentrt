# Kubernetes ConfigMap for AgentRT gateway Module - Development Environment
# Version: 0.1.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: agentos-gateway-manager
  namespace: agentos-development
  labels:
    app: agentos-gateway
    environment: development
    managed-by: agentos-ci
data:
  AGENTOS_ENV: "development"
  AGENTOS_LOG_LEVEL: "DEBUG"
  AGENTOS_HTTP_PORT: "8080"
  AGENTOS_WS_PORT: "8081"
  AGENTOS_MAX_SESSIONS: "100"
  AGENTOS_SESSION_TIMEOUT: "3600"
  AGENTOS_HEALTH_CHECK_INTERVAL: "30"
  REDIS_HOST: "redis-development"
  REDIS_PORT: "6379"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
---
