# OpenLab Configuration
# =====================

# Application Settings
app:
  name: "OpenLab"
  version: "0.1.0"
  environment: "development"
  debug: true

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  output: "stdout"
  fields:
    - timestamp
    - level
    - name
    - message

# Agent Management
agent:
  max_instances: 100
  shutdown_timeout: 30.0
  health_check_interval: 60.0

# Task Scheduling
scheduler:
  max_concurrent: 100
  max_queue_size: 10000
  default_timeout: 300.0
  retry_base_delay: 1.0
  retry_max_delay: 60.0

# Tool Execution
tool:
  max_concurrent: 50
  default_timeout: 60.0
  pool_size: 10

# Storage Configuration
storage:
  backend: "sqlite"
  path: "./data/openlab.db"
  wal_mode: true
  busy_timeout: 30.0

# Architect Agent Specific
architect:
  verbose: true
  output_format: "json"
  tool_timeout: 120.0
  max_components: 50
