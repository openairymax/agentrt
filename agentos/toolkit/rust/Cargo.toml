[package]
name = "agentos-rs"
version = "3.0.0"
edition = "2021"
description = "AgentOS Rust SDK - 与 Go SDK 保持一致的模块化结构"
license = "MIT"
homepage = "https://github.com/spharx/agentos"
repository = "https://github.com/spharx/agentos"
authors = ["Spharx AgentOS Team"]

[dependencies]
# HTTP 客户端
reqwest = { version = "0.11", features = ["json", "rustls-tls", "blocking"] }

# 异步运行时
tokio = { version = "1", features = ["full"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 错误处理
thiserror = "1.0"

# 异步 trait
async-trait = "0.1"

# 时间处理
chrono = { version = "0.4", features = ["serde"] }

# UUID 生成
uuid = { version = "1.0", features = ["v4"] }

# URL 编码
urlencoding = "2.1"

# 随机数
rand = "0.8"

# 单例模式
once_cell = "1.19"

[dev-dependencies]
tokio-test = "0.4"
assert_cmd = "2.0"
pretty_assertions = "1.0"
futures = "0.3"
