# Kubernetes ConfigMap for AgentRT gateway Module - Development Environment
# Version: 0.1.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: agentrt-gateway-manager
  namespace: agentrt-development
  labels:
    app: agentrt-gateway
    environment: development
    managed-by: agentrt-ci
data:
  AGENTRT_ENV: "development"
  AGENTRT_LOG_LEVEL: "DEBUG"
  AGENTRT_HTTP_PORT: "8080"
  AGENTRT_WS_PORT: "8081"
  AGENTRT_MAX_SESSIONS: "100"
  AGENTRT_SESSION_TIMEOUT: "3600"
  AGENTRT_HEALTH_CHECK_INTERVAL: "30"
  REDIS_HOST: "redis-development"
  REDIS_PORT: "6379"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
---
