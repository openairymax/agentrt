/*
 * cppcheck configuration for AgentOS Gateway module
 *
 * Suppression rules:
 * - missingIncludeSystem: Ignore system headers not found in analysis path
 * - unusedFunction: Allow functions that are part of public API
 * - constParameter: Some callbacks use non-const for compatibility
 */

// Suppress warnings for known patterns
suppress = missingIncludeSystem
suppress = unusedFunction:gateway_http_create
suppress = unusedFunction:gateway_ws_create
suppress = unusedFunction:gateway_stdio_create

// Enable additional checks
enable = warning
enable = style
enable = performance
enable = information
enable = portability

// C standard
std=c11

// Platform specific
platform=unix64

// Verbosity
verbose

// Inline suppressions (used in source code)
inlineSuppress

// Maximum code complexity
maxCyclomaticComplexity = 10

// Maximum function length (lines)
maxFunctionLength = 100

// Maximum number of parameters
maxParameters = 8

// Maximum nesting depth
maxNestingDepth = 5
